  function tanda(desde){
    for(var i=0;i<desde;i++){
      var piece = document.createElement("span");
      piece.className = "confetti-piece";
      var size = 7 + Math.random()*(grande?12:8);
      piece.style.left = (Math.random()*100)+"vw";
      piece.style.background = colors[Math.floor(Math.random()*colors.length)];
      piece.style.width = size+"px";
      piece.style.height = (Math.random()<0.5 ? size*0.42 : size)+"px";
      if(Math.random()<0.35) piece.style.borderRadius = "50%";
      piece.style.animationDelay = (Math.random()*(grande?0.8:0.5))+"s";
      piece.style.animationDuration = ((grande?2.8:2.4)+Math.random()*2)+"s";
      piece.style.setProperty("--rot", (Math.random()*1080-540)+"deg");
      piece.style.setProperty("--drift", ((Math.random()*2-1)*(grande?200:140))+"px");
      container.appendChild(piece);
    }
  }
  tanda(total);
  if(grande) setTimeout(function(){ tanda(120); }, 550); // segunda explosión para el cuadre total
  setTimeout(function(){ container.remove(); }, grande ? 6500 : 5200);

  if(opts.mensaje){
    var toast = document.createElement("div");
    toast.className = "celebrate-toast" + (grande?" grande":"");
    toast.innerHTML = '<div class="celebrate-emoji">'+(grande?"🏆":"🎉")+'</div>' +
      '<div class="celebrate-msg">'+opts.mensaje+'</div>';
    document.body.appendChild(toast);
    setTimeout(function(){ toast.remove(); }, grande?3900:3300);
  }
}
function celebrarPaso(pasoKey){ launchConfetti({mensaje: nombreCortoPaso(pasoKey)+" cuadrado — "+fraseAzar(FRASES_PASO)}); }
function celebrarTodo(){ launchConfetti({grande:true, mensaje: fraseAzar(FRASES_TODO)}); }

    headerHtml() +
    '<div class="hero">' +
      '<div class="greet">'+greeting+'</div>' +

    {id:"modulo2", nombre:"Revisión de movimientos pendientes",
      desc:"Un solo Excel: se filtran y listan los movimientos sin conciliar.",
      enabled:false, icon:"🧾", iconBg:"var(--accent-purple-bg)", tag:TAG_REVISION,
      tagText:"1 archivo", action:"Próximamente"},
    {id:"modulo3", nombre:"Conciliador de auxiliares",
      desc:"Compara el diario contra el auxiliar y enumera las diferencias entre ambas fuentes.",

    if(m.enabled){ el.onclick = function(){ STATE.view = m.id; render(); }; }

}

function dzHtml(key, label, esperado){
  var f = STATE.files[key];
  return '<div class="dz'+(f?" filled":"")+'" data-key="'+key+'">' +
    '<div class="ico">'+(f?"✓":"📄")+'</div>' +
    '<div class="info">' +
      '<div class="lbl">'+label+'</div>' +
      '<div class="expected">Archivo esperado: <b>'+esperado+'</b></div>' +
      '<div class="sub">'+(f?("Subido: "+f.name):"Sin subir · arrastra el Excel aquí o usa el botón")+'</div>' +
    '</div>' +
    '<label class="btn-sel">'+(f?"Cambiar":"Subir")+'<input type="file" accept=".xlsx,.xls" data-key="'+key+'"></label>' +
    '</div>';
}

// Nombre legible de cada archivo (para avisar exactamente qué falta en cada paso).
var FILE_LABELS = {
  transitoPrevio: "Resumen en tránsito del mes anterior (Paso 0)",
  reporte: "Reporte consolidado de caja (Paso 1)",
  diarioCaja: "Diario Caja General (Paso 1)",
  estBanistmo: "Estado de cuenta Banistmo (Paso 2)",
  estStg: "Estado de cuenta STG (Paso 2)",
  estBancoGeneral: "Estado de cuenta Banco General (Paso 2)",
  diarioBanistmo: "Diario Banistmo (Paso 3)",
  diarioStg: "Diario STG (Paso 3)",
  diarioBancoGeneral: "Diario Banco General (Paso 3)",
  retVisa: "Informe de retenciones VISA (Paso 2)"
};
function faltantesDePaso(pasoKey){
  return (PASO_REQS[pasoKey]||[]).filter(function(k){ return !STATE.files[k]; })
    .map(function(k){ return FILE_LABELS[k] || k; });
}
function stageRunHtml(pasoKey){
  var listo = pasoListo(pasoKey);
  var desbloqueado = pasoDesbloqueado(pasoKey);
  var cuadrado = pasoCuadrado(pasoKey);
  var habilitado = listo && desbloqueado;
  var nota;
  if(!listo) nota = "Faltan archivos: " + faltantesDePaso(pasoKey).join(", ") + ".";
  else if(!desbloqueado) nota = "Bloqueado — primero debe cuadrar el " + nombreCortoPaso(pasoPrevio(pasoKey)) + ".";
  else if(cuadrado) nota = "Ya cuadró. Puedes volver a ejecutarlo si cambiaste archivos.";
  else nota = "Listo para ejecutar de forma independiente.";
  return '<div class="stage-run">' +
    '<button class="btn-step-run" data-paso="'+pasoKey+'"'+(habilitado?'':' disabled')+'>Ejecutar solo este paso</button>' +
    '<span class="stage-run-note'+(!desbloqueado?' locked':'')+'">'+(cuadrado?'✓ ':'')+nota+'</span>' +
  '</div>';
}

function saldoCtxHtml(s, pasoKey){
  function bal(v){ return (v<0?"-":"")+"B/ "+Math.abs(v).toFixed(2); }
  var partes = [];
  if(s.inicial!==null) partes.push('saldo inicial'+(s.fechaInicial?" ("+s.fechaInicial+")":"")+': <b>'+bal(s.inicial)+'</b>');
  if(s.movimiento!==null) partes.push('movimiento del mes: <b>'+bal(s.movimiento)+'</b>');
  if(s.final!==null) partes.push('saldo final'+(s.fechaFinal?" ("+s.fechaFinal+")":"")+': <b>'+bal(s.final)+'</b>');
  var sub = pasoKey==="paso2"
    ? 'El saldo inicial es lo que quedó en tránsito del mes anterior y debía compensar este mes: validá que las entradas de los primeros días del banco lo cubren. Y lo del último día del mes queda en tránsito para el mes siguiente (ver "En tránsito").'
    : 'Ese saldo es dinero en tránsito arrastrado del mes anterior. Algunas partidas sin emparejar de este mes pueden corresponder a operaciones anteriores que compensan ahora — revísalas contra el saldo antes de darlas por diferencia.';
  return '<div class="saldo-ctx"><span class="ico">🔄</span><div class="txt">' +
    '<div class="saldo-line">Caja General — ' + partes.join(' · ') + '</div>' +
    '<div class="saldo-sub">' + sub + '</div>' +
    '</div></div>';
}

function renderResultados(){
  var area = document.getElementById("resultsArea");
  var r = STATE.results;
  var pasosMeta = [];
  // Paso 0 es obligatorio: siempre se muestra.
  pasosMeta.push({key:"paso0", corto:"Paso 0", titulo:"Paso 0 — Partidas en tránsito del mes anterior → bancos de este mes (obligatorio)"});
  pasosMeta.push(
    {key:"paso1", corto:"Paso 1", titulo:"Paso 1 — Reporte de cajeras vs. Diario Caja General"},
    {key:"paso2", corto:"Paso 2", titulo:"Paso 2 — Reporte / Caja General vs. Estados de cuenta bancarios"},
    {key:"paso3", corto:"Paso 3", titulo:"Paso 3 — Diario bancario vs. Estado de cuenta + validación VISA"}
  );
  var keysRender = pasosMeta.map(function(p){return p.key;});
  var totalRojas = keysRender.reduce(function(sum,k){ return sum + contarRojas(r[k]); }, 0);
  var totalSinConf = keysRender.reduce(function(sum,k){ return sum + contarSinConfirmar(r[k]); }, 0);

  function findingHtml(p, item, idx){
    var ckKey = p.key+"_"+idx;
    var checked = STATE.checks[ckKey] ? "checked" : "";
    var montoTxt = (item.monto<0?"-":"")+"B/ "+Math.abs(item.monto).toFixed(2);
    return '<div class="finding'+(STATE.checks[ckKey]?" done":"")+'">' +
      '<input type="checkbox" data-ck="'+ckKey+'" '+checked+'>' +
      '<div class="ftxt">'+item.texto+'<span class="src">'+item.fuente+'</span></div>' +
      '<div class="famt">'+montoTxt+'</div></div>';
  }

  var html = '<div class="results-head"><h2>Hallazgos</h2>' +
    '<button class="btn-export" id="exportBtn">Descargar checklist (Excel)</button></div>';
  var totalTransito = keysRender.reduce(function(sum,k){ return sum + contarEnTransito(r[k]); }, 0);

  // Cuando TODO el módulo (Pasos 1-3) cuadra, ofrecer el resumen de partidas en tránsito para el próximo mes.
  var todoCuadrado = tieneCuadreLimpio(PASO_ORDEN, r) && PASO_ORDEN.every(pasoCuadrado);
  // Panel de partidas en tránsito: se muestra siempre que haya alguna (no depende de que todo cuadre,
  // porque el resumen sale de Paso 0 + Paso 2, que son independientes de las rojas de Paso 3).
  var tt = totalesEnTransitoPorBanco();
  if(tt.count > 0){
    var bancosTxt = Object.keys(tt.porBanco).sort().map(function(b){
      var x = tt.porBanco[b];
      var detalle = x.otros>0.005 ? " (cheques B/ "+x.cheques.toFixed(2)+" + otros B/ "+x.otros.toFixed(2)+")" : "";
      return b + ": B/ " + x.total.toFixed(2) + detalle;
    }).join("<br>");
    var subNota = todoCuadrado
      ? "Descarga el resumen y cárgalo en el Paso 0 del mes siguiente para validar que compensen."
      : "Aún quedan diferencias por resolver, pero este resumen ya está listo (sale del Paso 0 y del Paso 2). Cárgalo en el Paso 0 del mes siguiente.";
    html += '<div class="cierre-panel"><div class="cierre-txt">' +
      '<div class="cierre-title">'+(todoCuadrado ? '🎉 Módulo cuadrado' : '📋 Partidas en tránsito')+'</div>' +
      '<div class="cierre-sub"><strong>Total en tránsito para el próximo mes: B/ '+tt.total.toFixed(2)+'</strong> ('+tt.count+' partida(s))' +
      '<br>Cheques: B/ '+tt.cheques.toFixed(2)+' · Otros depósitos (tarjeta/fin de mes): B/ '+tt.otros.toFixed(2) +
      (bancosTxt ? '<br>'+bancosTxt : '') +
      '<br>'+subNota+'</div>' +
      '</div><button class="btn-run" id="btnTransito">Descargar resumen en tránsito</button></div>';
  }
  html += '<div class="summary-bar">' +
    '<span class="chip'+(totalRojas===0?" ok":" alert")+'">'+totalRojas+' diferencia(s) en total</span>' +
    (totalSinConf>0 ? '<span class="chip warn">'+totalSinConf+' sin confirmar banco</span>' : '') +
    (totalTransito>0 ? '<span class="chip warn">'+totalTransito+' en tránsito</span>' : '');
  pasosMeta.forEach(function(p){
    var items = r[p.key];
    var chipTxt = items===undefined ? "—" : items===null ? "omitido" : String(contarRojas(items));
    html += '<span class="chip">'+p.corto+': '+chipTxt+'</span>';
  });
  html += '</div>';

  pasosMeta.forEach(function(p){
    var items = r[p.key];
    var esArray = Array.isArray(items);
    var bloqueado = items==="bloqueado";
    var cuadrado = esArray && contarRojas(items)===0;
    var rojas = esArray ? items.filter(function(i){return !esNoRojo(i);}) : [];
    var sinConf = esArray ? items.filter(esSinConfirmar) : [];
    var enTransito = esArray ? items.filter(esEnTransito) : [];
    var efectivo = esArray ? items.filter(esEfectivo) : [];
    var countTxt = items===undefined ? "sin ejecutar" : items===null ? "omitido" : bloqueado ? "bloqueado"
      : (rojas.length+' diferencia(s)' + (sinConf.length? ' · '+sinConf.length+' sin confirmar' : '') + (enTransito.length? ' · '+enTransito.length+' en tránsito' : '') + (efectivo.length? ' · '+efectivo.length+' efectivo' : ''));
    var idxPaso = PASO_ORDEN.indexOf(p.key);
    html += '<div class="step-block'+(cuadrado?' cuadrado':'')+'"><div class="step-head"><h4>'+p.titulo+'</h4>' +
      '<span class="count">'+countTxt+'</span></div><div class="step-body">';
    // Contexto del saldo inicial de Caja General (Pasos 2 y 3): dinero en tránsito arrastrado del mes anterior.
    if((p.key==="paso2" || p.key==="paso3") && esArray && STATE.saldoCajaGeneral){
      html += saldoCtxHtml(STATE.saldoCajaGeneral, p.key);
    }
    if(items===undefined){
      html += '<div class="empty-skip">Aún no se ejecutó este paso — usa "Ejecutar solo este paso" o el botón global.</div>';
    } else if(bloqueado){
      html += '<div class="empty-skip">🔒 Bloqueado — primero debe cuadrar el '+nombreCortoPaso(pasoPrevio(p.key))+'.</div>';
    } else if(items===null){
      html += '<div class="empty-skip">'+(p.key==="paso1"
        ? "Paso omitido: no se subió el reporte de cajeras."
        : "Paso omitido: faltan archivos de este paso.")+'</div>';
    } else {
      if(rojas.length===0){
        html += '<div class="empty-ok">Sin diferencias detectadas en este paso.</div>';
      } else {
        items.forEach(function(item, idx){ if(!esNoRojo(item)) html += findingHtml(p, item, idx); });
      }
      if(enTransito.length){
        html += '<div class="sinconf-block transito"><div class="sinconf-head">En tránsito — pendiente por cambiar ('+enTransito.length+')' +
          '<span class="sinconf-sub">Cheques registrados como depósito que aún no aparecen en ningún banco. No es diferencia: probablemente están pendientes de compensar.</span></div>';
        items.forEach(function(item, idx){ if(esEnTransito(item)) html += findingHtml(p, item, idx); });
        html += '</div>';
      }
      if(sinConf.length){
        html += '<div class="sinconf-block"><div class="sinconf-head">Sin confirmar el banco ('+sinConf.length+')' +
          '<span class="sinconf-sub">La plata está en el sistema, pero el depósito no trae etiqueta de banco. Verifica manualmente.</span></div>';
        items.forEach(function(item, idx){ if(esSinConfirmar(item)) html += findingHtml(p, item, idx); });
        html += '</div>';
      }
      if(efectivo.length){
        html += '<div class="sinconf-block efectivo"><div class="sinconf-head">Depósitos en efectivo — Brinks ('+efectivo.length+')' +
          '<span class="sinconf-sub">Movimientos "Ach De Brinks Panama" del estado de cuenta: son el efectivo del reporte de cajeras, no una diferencia.</span></div>';
        items.forEach(function(item, idx){ if(esEfectivo(item)) html += findingHtml(p, item, idx); });
        html += '</div>';
      }
      // Etiqueta CUADRADO al pie del bloque cuando el paso no tiene diferencias rojas.
      if(cuadrado) html += '<div class="cuadrado-badge">CUADRADO</div>';
    }
    html += '</div></div>';
  });
  area.innerHTML = html;

  area.querySelectorAll('input[type=checkbox]').forEach(function(cb){
    cb.addEventListener("change", function(){
      var k = cb.getAttribute("data-ck");
      STATE.checks[k] = cb.checked;
      renderResultados();
    });
  });
  document.getElementById("exportBtn").onclick = exportarChecklist;
  var btnT = document.getElementById("btnTransito");
  if(btnT) btnT.onclick = exportarEnTransito;
}

function exportarChecklist(){
  var r = STATE.results;
  var rows = [["Paso","Fecha","Banco","Monto","Estado","Hallazgo","Fuente","Corregido"]];
  var pasosMeta = [["Paso 0","paso0"],["Paso 1","paso1"],["Paso 2","paso2"],["Paso 3","paso3"]];
  pasosMeta.forEach(function(p){
    var label = p[0], key = p[1], items = r[key];
    if(items===undefined){
      rows.push([label, "", "", "", "", "Paso no ejecutado en esta sesión.", "", ""]);
      return;
    }
    if(items===null){
      rows.push([label, "", "", "", "", key==="paso1"
        ? "Paso omitido: no se subió el reporte de cajeras."
        : "Paso omitido: faltan archivos de este paso.", "", ""]);
      return;
    }
    items.forEach(function(item, idx){
      var ckKey = key+"_"+idx;
      var estado = esSinConfirmar(item) ? "Sin confirmar banco" : esEnTransito(item) ? "En tránsito" : esEfectivo(item) ? "Efectivo (Brinks)" : "Diferencia";
      rows.push([label, item.fecha, item.banco, item.monto, estado, item.texto, item.fuente, STATE.checks[ckKey] ? "Sí" : "No"]);
    });
  });
  var ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:8},{wch:12},{wch:10},{wch:12},{wch:18},{wch:70},{wch:40},{wch:10}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Hallazgos");
  XLSX.writeFile(wb, "checklist_conciliacion_caja_general.xlsx");
}

/* ---------------- Resumen de partidas en tránsito (para el Paso 0 del próximo mes) ---------------- */
// Junta todas las partidas "en tránsito" de los resultados (principalmente del Paso 2).
// Arma el resumen de lo que queda en tránsito para el próximo mes. Se toma de:
//  - Paso 0: cheques de meses anteriores que AÚN no compensaron (se siguen arrastrando).
//  - Paso 2: lo que Caja General depositó este mes y no clareó en el banco (cheques por cambiar,
//    depósitos de fin de mes). Es la vista "lo que depositamos que no clareó".
// NO se toma de Paso 3 (diario bancario vs estado): duplicaría los ítems de fin de mes de Paso 2 y
// además incluye compensaciones de ENTRADA del mes anterior (primer día), que no se arrastran.
function recolectarEnTransito(){
  var out = [];
  var p0 = STATE.results && STATE.results.paso0;
  if(Array.isArray(p0)) p0.forEach(function(it){ if(esEnTransito(it)) out.push(it); });
  var p2 = STATE.results && STATE.results.paso2;
  if(Array.isArray(p2)) p2.forEach(function(it){ if(esEnTransito(it)) out.push(it); });
  return out;
}
// Un ítem en tránsito es cheque si su concepto/texto lo dice (Paso 0 y detalle de cheques); el resto
// (tarjetas VISA/CLAVE, Yappy de fin de mes) son "otros depósitos".
function esChequeEnTransito(it){
  return esChequeDesc((it.concepto||"") + " " + (it.texto||""));
}
// Total en tránsito desglosado por banco y por tipo (cheque vs otros), para mostrarlo al cerrar el módulo.
function totalesEnTransitoPorBanco(){
  var items = recolectarEnTransito();
  var porBanco = {}; var totCheques = 0, totOtros = 0;
  items.forEach(function(it){
    var b = it.banco||"—";
    if(!porBanco[b]) porBanco[b] = {cheques:0, otros:0, total:0};
    if(esChequeEnTransito(it)){ porBanco[b].cheques += it.monto; totCheques += it.monto; }
    else { porBanco[b].otros += it.monto; totOtros += it.monto; }
    porBanco[b].total += it.monto;
  });
  return { porBanco: porBanco, cheques: totCheques, otros: totOtros, total: totCheques+totOtros, count: items.length };
}
function exportarEnTransito(){
  var items = recolectarEnTransito();
  var rows = [["Fecha","Banco","Monto","Concepto","Comprobante","Motivo"]];
  items.forEach(function(it){
    rows.push([it.fecha, it.banco, it.monto, it.concepto||"", it.comprobante||"", it.motivo||"en tránsito"]);
  });
  var ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:12},{wch:14},{wch:12},{wch:44},{wch:20},{wch:26}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "En transito");
  var mes = (STATE.saldoCajaGeneral && STATE.saldoCajaGeneral.fechaFinal) ? STATE.saldoCajaGeneral.fechaFinal.slice(0,7) : "mes";
  XLSX.writeFile(wb, "en_transito_" + mes + ".xlsx");
}
// Lee un resumen de partidas en tránsito exportado (para el Paso 0 del mes siguiente).
function parseTransitoPrevio(rows){
  var hIdx = findHeaderRow(rows, ["Fecha","Banco","Monto"]);
  if(hIdx===-1) throw new Error("No se encontró el encabezado (Fecha, Banco, Monto) en el resumen en tránsito.");
  var h = rows[hIdx];
  var cF=colIdx(h,"Fecha"), cB=colIdx(h,"Banco"), cM=colIdx(h,"Monto"), cC=colIdx(h,"Concepto"), cR=colIdx(h,"Comprobante");
  var out = [];
  for(var r=hIdx+1;r<rows.length;r++){
    var row = rows[r]; if(!row) continue;
    var iso = toISODate(cF>=0?row[cF]:null, false);
    var monto = money(cM>=0?row[cM]:0);
    if(!iso || !monto) continue;
    // Normaliza el nombre del banco a la forma canónica (acepta "stg"/"STG", "banistmo", etc.).
    var bancoRaw = cB>=0?String(row[cB]||"").trim():"";
    var banco = clasificarBancoPorTexto(bancoRaw) || bancoRaw;
    var concepto = cC>=0?String(row[cC]||"").trim():"";
    var comprobante = cR>=0?String(row[cR]||"").trim():"";
    // Sentido: un cheque EMITIDO (pago / débito en circulación) compensa como DÉBITO en el estado. Se
    // detecta por la nota "débito en circulación" en la fila, o por el comprobante/referencia que empieza
    // con "PAY" (los pagos llevan referencia PAY). Por defecto, crédito (cobros/depósitos).
    var rowTxt = normTxt(row.join(" "));
    var sentido = (rowTxt.indexOf("DEBITO")!==-1 || /^PAY/i.test(comprobante)) ? "debito" : "credito";
    out.push({ fecha:iso, banco: banco, monto:monto, concepto: concepto,
               comprobante: comprobante, sentido: sentido });
  }
  return out;
}

// Línea del estado que es una "Remisión Clave" (compensación de tarjeta CLAVE).
function esRemisionClave(desc){ var n = normTxt(desc); return n.indexOf("REMISION")!==-1 && n.indexOf("CLAVE")!==-1; }
// Paso 0: valida que las partidas en tránsito de meses anteriores compensaron en los bancos de este mes.
// Una partida puede tardar semanas o meses, así que NO se limita por días: se empareja hacia adelante
// (la compensación nunca es anterior a la partida) con combinaciones. Según su TIPO compensa distinto:
//  - Cheque por depositar / depósito en tránsito → CRÉDITO del estado (depósito).
//  - Cheque EMITIDO (pago, "débito en circulación") → DÉBITO del estado (cargo).
//  - Clave en tránsito → crédito "Remisión Clave" del estado.
// Lo que no compensó sigue en tránsito y se arrastra al resumen del mes siguiente.
function paso0(transitoPrevio, estBanistmo, estStg, estBancoGeneral, ventanaDias, tolerancia){
  var estados = { "Banistmo": estBanistmo, "STG": estStg };
  if(estBancoGeneral) estados["Banco General"] = estBancoGeneral;
  var VENTANA = 366; // sin límite práctico (puede clarear meses después)
  var hallazgos = [];
  Object.keys(estados).forEach(function(banco){
    var items = transitoPrevio.filter(function(t){ return t.banco===banco; });
    if(!items.length) return;
    var estado = estados[banco] || [];
    var noAborted = function(x){ return normTxt((x.descripcion||"")+" "+(x.referencia||"")).indexOf("ABORTED")===-1; };
    // Pools del estado según cómo compensa cada tipo (con .usado para no reusar la misma línea).
    var poolDeb   = estado.filter(function(x){ return x.debito>0 && noAborted(x); }).map(function(x){ return {fecha:x.fecha, monto:x.debito, usado:false}; });   // cheques emitidos (pagos) → débito
    var poolCred  = estado.filter(function(x){ return x.credito>0 && noAborted(x); }).map(function(x){ return {fecha:x.fecha, monto:x.credito, usado:false}; });   // depósito en tránsito → cualquier crédito
    var poolDep   = estado.filter(function(x){ return x.credito>0 && esDepositoEstado(x.descripcion) && noAborted(x); }).map(function(x){ return {fecha:x.fecha, monto:x.credito, usado:false}; }); // cheques por depositar → depósito
    var poolClave = estado.filter(function(x){ return x.credito>0 && esRemisionClave(x.descripcion) && noAborted(x); }).map(function(x){ return {fecha:x.fecha, monto:x.credito, usado:false}; }); // clave → remisión clave
    // Clasifica cada partida y le asigna su pool de compensación (según concepto y sentido).
    function poolDe(item){
      if(item.sentido==="debito") return poolDeb;                          // cheque emitido (pago) → débito del estado
      var c = normTxt(item.concepto);
      if(c.indexOf("CLAVE")!==-1) return poolClave;                        // clave en tránsito → remisión clave
      if(c.indexOf("DEPOSITO")!==-1) return poolCred;                      // depósito en tránsito → cualquier crédito
      return poolDep;                                                      // cheque por depositar → depósito
    }
    var chs = items.map(function(t){ return {fecha:t.fecha, monto:t.monto, concepto:t.concepto, comprobante:t.comprobante, sentido:t.sentido, usado:false, pool:poolDe(t)}; });
    // Paso A: cada partida contra su pool, hacia adelante (una compensación por partida).
    chs.forEach(function(ch){
      if(ch.usado) return;
      var combo = buscarSubsetSuma(ch.pool, ch.fecha, ch.monto, VENTANA, tolerancia, 1, "adelante");
      if(combo){ combo.forEach(function(i){ ch.pool[i].usado=true; }); ch.usado=true; }
    });
    // Paso B: cada línea del estado no usada contra una combinación de partidas del MISMO pool (el banco
    // a veces junta varias en una), hacia atrás.
    [poolDeb, poolCred, poolDep, poolClave].forEach(function(pool){
      pool.forEach(function(d){
        if(d.usado) return;
        var candidatos = chs.filter(function(c){ return !c.usado && c.pool===pool; });
        var combo = buscarSubsetSuma(candidatos, d.fecha, d.monto, VENTANA, tolerancia, 12, "atras");
        if(combo){ combo.forEach(function(i){ candidatos[i].usado=true; }); d.usado=true; }
      });
    });
    // Partidas que no compensaron → siguen en tránsito (rotuladas con su concepto real).
    chs.forEach(function(ch){
      if(ch.usado) return;
      var etiqueta = (ch.concepto||"").trim() || "Partida en tránsito";
      hallazgos.push({ fecha:ch.fecha, banco:banco, monto:ch.monto, clase:"en_transito",
        concepto:ch.concepto, comprobante:ch.comprobante, motivo:"aún pendiente de compensar",
        texto:etiqueta+" de B/ "+ch.monto.toFixed(2)+" ("+ch.fecha+", "+banco+") de un período anterior aún NO compensó este mes."+(ch.comprobante?" · Comprobante "+ch.comprobante:""),
        fuente:"Paso 0 — partidas en tránsito / Estado de cuenta "+banco });
    });
  });
  return hallazgos;
}

render();
