<body>
<div class="app" id="app"></div>

<script>
var STATE = {
  view:"menu",
  files:{
    reporte:null, diarioCaja:null, diarioBanistmo:null, diarioStg:null,
    estBanistmo:null, estStg:null, retVisa:null
  },
  parsed:{},
  options:{ ventanaDias:3, tolerancia:0.01 },
  results:null,
  checks:{}
};

/* ---------------- Utilidades ---------------- */
function normTxt(s){
  if(s===null||s===undefined) return "";
  s = String(s);
  s = s.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  return s.toUpperCase().replace(/\s+/g," ").trim();
}
function money(v){
  if(v===null||v===undefined||v==="") return 0;
  if(typeof v==="number") return v;
  var s = String(v).replace(/B\/\.?/gi,"").replace(/\$/g,"").replace(/,/g,"").trim();
  var neg = false;
  if(s.indexOf("(")===0){ neg=true; s=s.replace(/[()]/g,""); }
  if(s.indexOf("-")===0){ neg=true; s=s.replace("-",""); }
  var n = parseFloat(s);
  if(isNaN(n)) return 0;
  return neg ? -n : n;
}
function toISODate(v, mdY){
  if(v===null||v===undefined||v==="") return null;
  if(v instanceof Date && !isNaN(v)) {
    return v.getFullYear()+"-"+String(v.getMonth()+1).padStart(2,"0")+"-"+String(v.getDate()).padStart(2,"0");
  }
  var s = String(v).trim();
  var m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(m){
    var a = parseInt(m[1],10), b = parseInt(m[2],10), y = m[3];
    var mm, dd;
    if(mdY){ mm=a; dd=b; } else { dd=a; mm=b; }
    return y+"-"+String(mm).padStart(2,"0")+"-"+String(dd).padStart(2,"0");
  }
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return m[0].slice(0,10);
  return null;
}
function daysBetween(iso1, iso2){
  if(!iso1||!iso2) return Infinity;
  var d1 = new Date(iso1+"T00:00:00"), d2 = new Date(iso2+"T00:00:00");
  return Math.abs((d1-d2)/86400000);
}
function readWorkbook(file, cb){
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var data = new Uint8Array(e.target.result);
      var wb = XLSX.read(data, {type:"array", cellDates:true});
      var sheet = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(sheet, {header:1, raw:true, defval:null});
      cb(rows);
    }catch(err){ alert("No se pudo leer el archivo: "+err.message); }
  };
  reader.readAsArrayBuffer(file);
}
function findHeaderRow(rows, tokens){
  for(var i=0;i<rows.length;i++){
    var row = rows[i];
    if(!row) continue;
    var norm = row.map(function(c){return normTxt(c);});
    var hits = 0;
    for(var t=0;t<tokens.length;t++){
      if(norm.some(function(c){return c.indexOf(normTxt(tokens[t]))!==-1;})) hits++;
    }
    if(hits >= Math.min(3, tokens.length)) return i;
  }
  return -1;
}
function colIdx(headerRow, token){
  for(var i=0;i<headerRow.length;i++){
    if(normTxt(headerRow[i]).indexOf(normTxt(token))!==-1) return i;
  }
  return -1;
}

/* ---------------- Parsers por fuente ---------------- */

// 1) Reporte consolidado de caja (manual, por cajera)
// Soporta dos formatos:
//  a) Encabezado en 2 filas: fila de grupo (VISA/CLAVE/ACH/CHEQUE) + fila de sub-encabezado (Fecha, Cajera, Sr.George, Banistmo, Total)
//  b) Encabezado en 1 fila combinada (formato anterior: "Visa\nSr.George")
function parseReporteConsolidado(rows){
  var subIdx = findHeaderRow(rows, ["Fecha","Cajera","Sr.George","Banistmo"]);
  if(subIdx===-1) throw new Error("No se encontró el encabezado esperado en el reporte consolidado de caja.");
  var subRow = rows[subIdx];
  var cFecha = colIdx(subRow,"Fecha");
  var cCajera = colIdx(subRow,"Cajera");
  var mapCols = [];

  // Intento (a): dos filas de encabezado, con rellenado hacia adelante de la fila de grupo (celdas combinadas)
  var groupRow = rows[subIdx-1] || [];
  var metodosValidos = ["VISA","CLAVE","ACH","CHEQUE"];
  var filledGroup = [];
  var last = "";
  for(var i=0;i<subRow.length;i++){
    var g = groupRow[i];
    if(g!==null && g!==undefined && normTxt(g)!=="") last = normTxt(g);
    filledGroup[i] = last;
  }
  for(var i=0;i<subRow.length;i++){
    var sub = normTxt(subRow[i]);
    if(sub==="TOTAL" || sub==="") continue; // evitar subtotal por grupo
    var metodo = null;
    for(var m=0;m<metodosValidos.length;m++){
      if(filledGroup[i].indexOf(metodosValidos[m])!==-1){ metodo = metodosValidos[m]; break; }
    }
    if(!metodo) continue;
    var banco = null;
    if(sub.indexOf("GEORGE")!==-1) banco="STG";
    else if(sub.indexOf("BANISTMO")!==-1) banco="Banistmo";
    if(banco) mapCols.push({metodo:metodo, banco:banco, col:i});
  }

  // Intento (b, fallback): formato anterior con metodo+banco en la misma celda
  if(mapCols.length===0){
    function findPairCol(metodo, bancoTag){
      for(var i=0;i<subRow.length;i++){
        var raw = normTxt(subRow[i]);
        if(raw.indexOf(normTxt(metodo))!==-1 && raw.indexOf(normTxt(bancoTag))!==-1) return i;
      }
      return -1;
    }
    mapCols = [
      {metodo:"VISA", banco:"STG", col: findPairCol("Visa","George")},
      {metodo:"VISA", banco:"Banistmo", col: findPairCol("Visa","Banistmo")},
      {metodo:"CLAVE", banco:"STG", col: findPairCol("Clave","George")},
      {metodo:"CLAVE", banco:"Banistmo", col: findPairCol("Clave","Banistmo")},
      {metodo:"ACH", banco:"STG", col: findPairCol("ACH","George")},
      {metodo:"ACH", banco:"Banistmo", col: findPairCol("ACH","Banistmo")},
      {metodo:"CHEQUE", banco:"STG", col: findPairCol("Cheque","George")},
      {metodo:"CHEQUE", banco:"Banistmo", col: findPairCol("Cheque","Banistmo")}
    ].filter(function(m){return m.col>=0;});
  }

  var out = [];
  for(var r=subIdx+1;r<rows.length;r++){
    var row = rows[r];
    if(!row) continue;
    var fechaRaw = row[cFecha];
    if(fechaRaw===null||fechaRaw===undefined||normTxt(fechaRaw)==="" ) continue;
    if(normTxt(fechaRaw).indexOf("TOTAL")!==-1) continue;
    var iso = toISODate(fechaRaw, false);
    if(!iso) continue;
    var cajera = cCajera>=0 ? row[cCajera] : "";
    mapCols.forEach(function(m){
      var val = money(row[m.col]);
      if(val){
        out.push({fecha:iso, cajera:cajera, banco:m.banco, metodo:m.metodo, monto:val, fila:r+1});
      }
    });
  }
  return out;
}

// 2) Diario (navegador contabilidad) generico: Caja General / Banistmo / STG
function parseDiario(rows, accountFilter){
  var hIdx = findHeaderRow(rows, ["Fecha","Descripcion","Debito","Credito"]);
  if(hIdx===-1) throw new Error("No se encontró el encabezado esperado en el navegador de diario.");
  var cAccount = colIdx(rows[hIdx],"Account");
  var cFecha = colIdx(rows[hIdx],"Fecha");
  var cRef = colIdx(rows[hIdx],"Referencia");
  var cDesc = colIdx(rows[hIdx],"Descripcion");
  var cDeb = colIdx(rows[hIdx],"Debito");
  var cCred = colIdx(rows[hIdx],"Credito");
  var out = [];
  var lastAccount = "";
  for(var r=hIdx+1;r<rows.length;r++){
    var row = rows[r];
    if(!row) continue;
    if(normTxt(row.join(" ")).indexOf("SALDO TOTAL")!==-1) continue;
    if(normTxt(row.join(" ")).indexOf("MOVIMIENTO MOSTRADO")!==-1) continue;
    if(normTxt(row.join(" ")).indexOf("BALANCE FINAL")!==-1) continue;
    var acc = cAccount>=0 ? row[cAccount] : null;
    if(acc) lastAccount = acc;
    var fechaRaw = cFecha>=0 ? row[cFecha] : null;
    var iso = toISODate(fechaRaw, false);
    if(!iso) continue; // fila secundaria (glosa de detalle), no es movimiento
    var desc = cDesc>=0 ? String(row[cDesc]||"") : "";
    var deb = money(row[cDeb]);
    var cred = money(row[cCred]);
    if(accountFilter && lastAccount && normTxt(lastAccount).indexOf(normTxt(accountFilter))===-1) continue;
    out.push({fecha:iso, cuenta:lastAccount, referencia: cRef>=0?row[cRef]:"", descripcion:desc, debito:deb, credito:cred, fila:r+1});
  }
  return out;
}

// 3) Estado de cuenta bancario (Banistmo o STG)
function parseEstadoCuenta(rows, tipo){
  var tokens = tipo==="banistmo" ? ["Fecha","Descripcion","Debito","Credito","Saldo"] : ["Fecha","Descripcion","Debitos","Creditos","Balance"];
  var hIdx = findHeaderRow(rows, tokens);
  if(hIdx===-1) throw new Error("No se encontró el encabezado esperado en el estado de cuenta.");
  var cFecha = colIdx(rows[hIdx],"Fecha");
  var cDesc = colIdx(rows[hIdx],"Descripcion");
  var cDeb = tipo==="banistmo" ? colIdx(rows[hIdx],"Debito") : colIdx(rows[hIdx],"Debitos");
  var cCred = tipo==="banistmo" ? colIdx(rows[hIdx],"Credito") : colIdx(rows[hIdx],"Creditos");
  var out = [];
  for(var r=hIdx+1;r<rows.length;r++){
    var row = rows[r];
    if(!row) continue;
    var iso = toISODate(cFecha>=0?row[cFecha]:null, false);
    if(!iso) continue;
    var desc = cDesc>=0 ? String(row[cDesc]||"") : "";
    out.push({fecha:iso, descripcion:desc, debito:money(row[cDeb]), credito:money(row[cCred]), fila:r+1});
  }
  return out;
}

// 4) Retenciones VISA STG (detalle transaccional con subtotales)
function parseRetencionesVisa(rows){
  var hIdx = findHeaderRow(rows, ["Fecha","Monto Bruto","Ret. Imp","Comision","ITBMS"]);
  if(hIdx===-1) throw new Error("No se encontró el encabezado esperado en el informe de retenciones VISA.");
  var cSuc = colIdx(rows[hIdx],"Sucursal");
  var cFecha = colIdx(rows[hIdx],"Fecha");
  var cBruto = colIdx(rows[hIdx],"Monto Bruto");
  var cRet = colIdx(rows[hIdx],"Ret. Imp");
  var cCom = colIdx(rows[hIdx],"Comision");
  var cItbms = colIdx(rows[hIdx],"ITBMS");
  var porDia = {};
  for(var r=hIdx+1;r<rows.length;r++){
    var row = rows[r];
    if(!row) continue;
    var sucVal = cSuc>=0 ? normTxt(row[cSuc]) : "";
    if(sucVal.indexOf("SUB TOTAL")!==-1 || sucVal.indexOf("COMERCIO")!==-1) continue;
    var iso = toISODate(cFecha>=0?row[cFecha]:null, true); // formato MM/DD/YYYY
    if(!iso) continue;
    var bruto = money(row[cBruto]);
    var ret = money(row[cRet]);
    var com = money(row[cCom]);
    var itbms = money(row[cItbms]);
    if(!porDia[iso]) porDia[iso] = {fecha:iso, bruto:0, retenciones:0};
    porDia[iso].bruto += bruto;
    porDia[iso].retenciones += (ret+com+itbms); // vienen en negativo
  }
  var out = [];
  Object.keys(porDia).forEach(function(k){
    var d = porDia[k];
    d.neto = d.bruto + d.retenciones; // retenciones ya es negativo
    out.push(d);
  });
  return out;
}

/* ---------------- Motor de conciliacion ---------------- */

function sumBy(arr, keyFn, valFn){
  var m = {};
  arr.forEach(function(x){
    var k = keyFn(x);
    m[k] = (m[k]||0) + valFn(x);
  });
  return m;
}

// Paso 1: Reporte consolidado (por banco/dia) vs Diario Caja General (por dia, clasificado por banco via texto)
function clasificarBancoPorTexto(desc){
  var n = normTxt(desc);
  if(n.indexOf("BTS")!==-1 || n.indexOf("BANISTMO")!==-1) return "Banistmo";
  if(n.indexOf("STG")!==-1) return "STG";
  return null;
}
function paso1(reporte, diarioCaja, tolerancia){
  var repPorBancoDia = sumBy(reporte, function(x){return x.banco+"|"+x.fecha;}, function(x){return x.monto;});
  // Solo se toman las lineas de DEBITO (el desglose individual por banco/metodo);
  // las lineas de CREDITO suelen venir combinadas (ej. Visa+Clave juntos) y duplicarian el total.
  var cajaFiltrada = diarioCaja.filter(function(x){ return clasificarBancoPorTexto(x.descripcion) && x.debito>0; });
  var cajaPorBancoDia = sumBy(cajaFiltrada, function(x){return clasificarBancoPorTexto(x.descripcion)+"|"+x.fecha;},
    function(x){ return x.debito; });

  var claves = {};
  Object.keys(repPorBancoDia).forEach(function(k){claves[k]=true;});
  Object.keys(cajaPorBancoDia).forEach(function(k){claves[k]=true;});

  var hallazgos = [];
  Object.keys(claves).sort().forEach(function(k){
    var parts = k.split("|"); var banco = parts[0], fecha = parts[1];
    var a = repPorBancoDia[k]||0, b = cajaPorBancoDia[k]||0;
    var diff = Math.round((a-b)*100)/100;
    if(Math.abs(diff) > tolerancia){
      hallazgos.push({
        fecha:fecha, banco:banco,
        texto: "Diferencia " + banco + " " + fecha + ": reporte de cajeras B/ " + a.toFixed(2) +
               " vs. diario Caja General B/ " + b.toFixed(2) + " (dif. B/ " + diff.toFixed(2) + ")",
        fuente: "Reporte consolidado de caja / Diario Caja General"
      });
    }
  });
  return hallazgos;
}

// Paso 2: Diario Caja General (por banco/dia) vs Diario del banco (Banistmo/STG)
function paso2(diarioCaja, diarioBanistmo, diarioStg, tolerancia){
  var hallazgos = [];
  [{nombre:"Banistmo", diarioBanco:diarioBanistmo},{nombre:"STG", diarioBanco:diarioStg}].forEach(function(cfg){
    var cajaFiltrada = diarioCaja.filter(function(x){return clasificarBancoPorTexto(x.descripcion)===cfg.nombre && x.debito>0;});
    var cajaPorDia = sumBy(cajaFiltrada, function(x){return x.fecha;}, function(x){return x.debito;});
    var bancoPorDia = sumBy(cfg.diarioBanco, function(x){return x.fecha;}, function(x){return x.debito;}); // ingresos al banco = debito en el diario del banco
    var claves = {};
    Object.keys(cajaPorDia).forEach(function(k){claves[k]=true;});
    Object.keys(bancoPorDia).forEach(function(k){claves[k]=true;});
    Object.keys(claves).sort().forEach(function(fecha){
      var a = cajaPorDia[fecha]||0, b = bancoPorDia[fecha]||0;
      var diff = Math.round((a-b)*100)/100;
      if(Math.abs(diff) > tolerancia){
        hallazgos.push({
          fecha:fecha, banco:cfg.nombre,
          texto: "Diferencia " + cfg.nombre + " " + fecha + ": diario Caja General B/ " + a.toFixed(2) +
                 " vs. diario " + cfg.nombre + " B/ " + b.toFixed(2) + " (dif. B/ " + diff.toFixed(2) + ") — posible en tránsito",
          fuente: "Diario Caja General / Diario " + cfg.nombre
        });
      }
    });
  });
  return hallazgos;
}

// Paso 3: Diario del banco vs Estado de cuenta real (matching 1:1 por monto +- tolerancia, ventana de dias, excluyendo ABORTED)
function matchUnoAUno(origenA, campoA, origenB, campoB, ventanaDias, tolerancia){
  var usadosB = new Array(origenB.length).fill(false);
  var sinPar = [];
  origenA.forEach(function(a, idxA){
    if(normTxt(a.descripcion||a.referencia).indexOf("ABORTED")!==-1) return; // excluir silenciosamente
    var montoA = a[campoA];
    if(!montoA) return;
    var mejor = -1, mejorDist = Infinity;
    origenB.forEach(function(b, idxB){
      if(usadosB[idxB]) return;
      if(normTxt(b.descripcion).indexOf("ABORTED")!==-1) return;
      var montoB = b[campoB];
      if(Math.abs(montoA-montoB) <= tolerancia){
        var dist = daysBetween(a.fecha, b.fecha);
        if(dist <= ventanaDias && dist < mejorDist){ mejor = idxB; mejorDist = dist; }
      }
    });
    if(mejor>=0){ usadosB[mejor] = true; }
    else { sinPar.push(a); }
  });
  return sinPar;
}
function paso3(diarioBanistmo, diarioStg, estBanistmo, estStg, ventanaDias, tolerancia){
  var hallazgos = [];
  [
    {nombre:"Banistmo", diario:diarioBanistmo, estado:estBanistmo},
    {nombre:"STG", diario:diarioStg, estado:estStg}
  ].forEach(function(cfg){
    var faltanEnBanco = matchUnoAUno(
      cfg.diario.filter(function(x){return x.debito>0;}), "debito",
      cfg.estado.filter(function(x){return x.credito>0;}), "credito",
      ventanaDias, tolerancia
    );
    faltanEnBanco.forEach(function(f){
      hallazgos.push({
        fecha:f.fecha, banco:cfg.nombre,
        texto: cfg.nombre + " " + f.fecha + ": B/ " + f.debito.toFixed(2) + " registrado en el diario contable no aparece en el estado de cuenta",
        fuente: "Diario " + cfg.nombre + " (fila " + f.fila + ") / Estado de cuenta " + cfg.nombre
      });
    });
    var faltanEnDiario = matchUnoAUno(
      cfg.estado.filter(function(x){return x.credito>0;}), "credito",
      cfg.diario.filter(function(x){return x.debito>0;}), "debito",
      ventanaDias, tolerancia
    );
    faltanEnDiario.forEach(function(f){
      hallazgos.push({
        fecha:f.fecha, banco:cfg.nombre,
        texto: cfg.nombre + " " + f.fecha + ": B/ " + f.credito.toFixed(2) + " en el estado de cuenta no aparece registrado en el diario contable — " + (f.descripcion||"").trim(),
        fuente: "Estado de cuenta " + cfg.nombre + " (fila " + f.fila + ") / Diario " + cfg.nombre
      });
    });
  });
  return hallazgos;
}

// Paso 4: Retenciones VISA (neto por dia) vs Remision V/Mc del estado de cuenta STG (ventana de dias)
function paso4(retVisa, estStg, ventanaDias, tolerancia){
  var remisiones = estStg.filter(function(x){ return normTxt(x.descripcion).indexOf("REMISION")!==-1 && normTxt(x.descripcion).indexOf("V/MC")!==-1; });
  var usadas = new Array(remisiones.length).fill(false);
  var hallazgos = [];
  retVisa.forEach(function(d){
    var mejor=-1, mejorDist=Infinity;
    remisiones.forEach(function(r, idx){
      if(usadas[idx]) return;
      if(Math.abs(r.credito - d.neto) <= tolerancia){
        // El deposito bancario ocurre el mismo dia del cierre o hasta N dias despues, nunca antes.
        if(r.fecha < d.fecha) return;
        var dist = daysBetween(d.fecha, r.fecha);
        if(dist<=ventanaDias && dist<mejorDist){ mejor=idx; mejorDist=dist; }
      }
    });
    if(mejor>=0){ usadas[mejor]=true; }
    else {
      hallazgos.push({
        fecha:d.fecha, banco:"STG",
        texto:"VISA " + d.fecha + ": venta bruta B/ " + d.bruto.toFixed(2) + " menos retenciones B/ " + Math.abs(d.retenciones).toFixed(2) +
              " = neto esperado B/ " + d.neto.toFixed(2) + " sin depósito 'Remisión V/Mc' correspondiente en el estado de cuenta STG",
        fuente:"Informe de retenciones VISA STG / Estado de cuenta STG"
      });
    }
  });
  return hallazgos;
}

/* ---------------- Ejecución por paso (individual o global) ---------------- */
// Cada paso puede correrse solo (si tiene sus propios archivos) o como parte de la
// conciliación completa. r[pasoKey] === undefined -> nunca se ejecutó en esta sesión;
// === null -> se intentó pero faltan archivos de ese paso (se omite); array -> resultado real.
var PASO_ORDEN = ["paso1","paso2","paso3","paso4"];
var PASO_REQS = {
  paso1: ["reporte","diarioCaja"],
  paso2: ["diarioCaja","diarioBanistmo","diarioStg"],
  paso3: ["diarioBanistmo","diarioStg","estBanistmo","estStg"],
  paso4: ["retVisa","estStg"]
};

function pasoListo(pasoKey){
  return PASO_REQS[pasoKey].every(function(k){ return !!STATE.files[k]; });
}

function computePasoResult(pasoKey, raws, opts){
  if(pasoKey==="paso1"){
    if(!raws.reporte || !raws.diarioCaja) return null;
    return paso1(parseReporteConsolidado(raws.reporte), parseDiario(raws.diarioCaja,"Caja General"), opts.tol);
  }
  if(pasoKey==="paso2"){
    if(!raws.diarioCaja || !raws.diarioBanistmo || !raws.diarioStg) return null;
    var diarioCaja = parseDiario(raws.diarioCaja,"Caja General");
    var diarioBanistmo = parseDiario(raws.diarioBanistmo,"Banistmo");
    var diarioStg = parseDiario(raws.diarioStg,null).filter(function(x){ return normTxt(x.cuenta).indexOf("BANISTMO")===-1; });
    return paso2(diarioCaja, diarioBanistmo, diarioStg, opts.tol);
  }
  if(pasoKey==="paso3"){
    if(!raws.diarioBanistmo || !raws.diarioStg || !raws.estBanistmo || !raws.estStg) return null;
    var diarioBanistmo = parseDiario(raws.diarioBanistmo,"Banistmo");
    var diarioStg = parseDiario(raws.diarioStg,null).filter(function(x){ return normTxt(x.cuenta).indexOf("BANISTMO")===-1; });
    var estBanistmo = parseEstadoCuenta(raws.estBanistmo,"banistmo");
    var estStg = parseEstadoCuenta(raws.estStg,"stg");
    return paso3(diarioBanistmo, diarioStg, estBanistmo, estStg, opts.ventana, opts.tol);
  }
  if(pasoKey==="paso4"){
    if(!raws.retVisa || !raws.estStg) return null;
    var retVisa = parseRetencionesVisa(raws.retVisa);
    var estStgVisa = parseEstadoCuenta(raws.estStg,"stg");
    return paso4(retVisa, estStgVisa, opts.ventana, opts.tol);
  }
  return null;
}

function readMany(keys, cb){
  var uniq = keys.filter(function(k,i){ return keys.indexOf(k)===i; });
  var raws = {};
  var pending = uniq.length;
  if(pending===0){ cb(raws); return; }
  uniq.forEach(function(k){
    readWorkbook(STATE.files[k], function(rows){
      raws[k] = rows;
      pending--;
      if(pending===0) cb(raws);
    });
  });
}

function ensureResults(){
  if(!STATE.results) STATE.results = {paso1:undefined, paso2:undefined, paso3:undefined, paso4:undefined};
}

function tieneCuadreLimpio(keys, r){
  var evaluados = keys.filter(function(k){ return Array.isArray(r[k]); });
  if(evaluados.length===0) return false;
  return evaluados.every(function(k){ return r[k].length===0; });
}

function ejecutarPaso(pasoKey){
  if(!pasoListo(pasoKey)) return;
  var note = document.getElementById("runNote");
  if(note) note.textContent = "Leyendo archivos de este paso...";
  readMany(PASO_REQS[pasoKey], function(raws){
    try{
      var opts = {ventana: STATE.options.ventanaDias, tol: STATE.options.tolerancia};
      var result = computePasoResult(pasoKey, raws, opts);
      ensureResults();
      Object.keys(STATE.checks).forEach(function(k){ if(k.indexOf(pasoKey+"_")===0) delete STATE.checks[k]; });
      STATE.results[pasoKey] = result;
      if(note) note.textContent = "Paso ejecutado.";
      if(Array.isArray(result) && result.length===0) launchConfetti();
      renderResultados();
    }catch(err){
      if(note) note.textContent = "Error: " + err.message;
    }
  });
}

function ejecutarConciliacion(){
  var note = document.getElementById("runNote");
  note.textContent = "Leyendo archivos...";
  var allKeys = ["reporte","diarioCaja","diarioBanistmo","diarioStg","estBanistmo","estStg","retVisa"]
    .filter(function(k){ return STATE.files[k]; });
  readMany(allKeys, function(raws){
    try{
      var opts = {ventana: STATE.options.ventanaDias, tol: STATE.options.tolerancia};
      ensureResults();
      PASO_ORDEN.forEach(function(pasoKey){
        STATE.results[pasoKey] = computePasoResult(pasoKey, raws, opts);
      });
      STATE.checks = {};
      note.textContent = "Conciliación ejecutada.";
      if(tieneCuadreLimpio(PASO_ORDEN, STATE.results)) launchConfetti();
      renderResultados();
    }catch(err){
      note.textContent = "Error: " + err.message;
    }
  });
}

/* ---------------- Confetti (celebración cuando todo cuadra) ---------------- */
function launchConfetti(){
  var colors = ["#E79BB2","#C07A95","#B56B86","#8467B0","#4F9878","#D9A441"];
  var container = document.createElement("div");
  container.className = "confetti-container";
  document.body.appendChild(container);
  var total = 90;
  for(var i=0;i<total;i++){
    var piece = document.createElement("span");
    piece.className = "confetti-piece";
    var size = 6 + Math.random()*6;
    piece.style.left = (Math.random()*100)+"vw";
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.width = size+"px";
    piece.style.height = (size*0.4)+"px";
    piece.style.animationDelay = (Math.random()*0.4)+"s";
    piece.style.animationDuration = (2.2+Math.random()*1.4)+"s";
    piece.style.setProperty("--rot", (Math.random()*360)+"deg");
    piece.style.setProperty("--drift", ((Math.random()*2-1)*80)+"px");
    container.appendChild(piece);
  }
  setTimeout(function(){ container.remove(); }, 4000);
}

      dzHtml("estBanistmo","Estado de cuenta Banistmo","ESTADO_DE_CUENTA_..._BANISTMO_[MES].xlsx (movimientos_...)") +
      dzHtml("estStg","Estado de cuenta STG","estado_de_cta_stg_....xlsx (Fecha, Descripción, Débitos(-), Créditos(+))") +
    '</div>' + stageRunHtml("paso3") + '</div>' +

    '<div class="stage"><h3><span class="tag">PASO 4</span> Validación VISA STG</h3>' +
    '<p class="desc">Venta bruta − retención − comisión − ITBMS = depósito neto esperado en el banco.</p>' +
    '<div class="dropzones">' + dzHtml("retVisa","Informe de retenciones VISA STG","retenciones_de_visa_....xlsx (Monto Bruto, Ret. Imp, Comisión, ITBMS)") + '</div>' +
    stageRunHtml("paso4") + '</div>' +

    '<div class="opts">' +
      '<label>Ventana de días para emparejar <input type="number" id="ventana" value="'+STATE.options.ventanaDias+'" min="0"></label>' +
      '<label>Tolerancia B/ <input type="number" id="tolerancia" value="'+STATE.options.tolerancia+'" step="0.01" min="0"></label>' +
    '</div>' +

    '<div class="run-bar"><button class="btn-run" id="runBtn">Ejecutar los 4 pasos</button>' +
    '<span class="run-note" id="runNote">Sube los archivos de al menos un paso para habilitar.</span></div>' +

    '<div id="resultsArea"></div>';

  document.getElementById("backBtn").onclick = function(){ STATE.view="menu"; render(); };
  function assignFile(key, file){
    if(!file) return;
    STATE.files[key] = file;
    renderModulo1();
    if(STATE.results) renderResultados();
  }
  document.querySelectorAll('input[type=file]').forEach(function(inp){
    inp.addEventListener("change", function(e){
      assignFile(e.target.getAttribute("data-key"), e.target.files[0]);
    });
  });
  document.querySelectorAll('.dz').forEach(function(dz){
    var key = dz.getAttribute("data-key");
    dz.addEventListener("dragover", function(e){ e.preventDefault(); dz.classList.add("dragover"); });
    dz.addEventListener("dragleave", function(e){ dz.classList.remove("dragover"); });
    dz.addEventListener("drop", function(e){
      e.preventDefault();
      dz.classList.remove("dragover");
      assignFile(key, e.dataTransfer.files[0]);
    });
  });
  document.querySelectorAll('.btn-step-run').forEach(function(btn){
    btn.onclick = function(){ ejecutarPaso(btn.getAttribute("data-paso")); };
  });
  var ventInp = document.getElementById("ventana");
  var tolInp = document.getElementById("tolerancia");
  ventInp.addEventListener("change", function(){ STATE.options.ventanaDias = parseFloat(ventInp.value)||0; });
  tolInp.addEventListener("change", function(){ STATE.options.tolerancia = parseFloat(tolInp.value)||0.01; });

  var runBtn = document.getElementById("runBtn");
  var algunoListo = PASO_ORDEN.some(function(k){ return pasoListo(k); });
  if(algunoListo){
    document.getElementById("runNote").textContent = "Ejecuta los pasos con archivos completos; los demás se omiten.";
  } else {
    runBtn.disabled = true;
  }
  runBtn.onclick = ejecutarConciliacion;

  if(STATE.results) renderResultados();
}

function renderResultados(){
  var area = document.getElementById("resultsArea");
  var r = STATE.results;
  var total = PASO_ORDEN.reduce(function(sum,k){ return sum + (Array.isArray(r[k]) ? r[k].length : 0); }, 0);
  var pasosMeta = [
    {key:"paso1", corto:"Paso 1", titulo:"Paso 1 — Reporte de cajeras vs. Diario Caja General"},
    {key:"paso2", corto:"Paso 2", titulo:"Paso 2 — Diario Caja General vs. Diario bancario"},
    {key:"paso3", corto:"Paso 3", titulo:"Paso 3 — Diario bancario vs. Estado de cuenta"},
    {key:"paso4", corto:"Paso 4", titulo:"Paso 4 — Validación VISA STG"}
  ];

  var html = '<div class="results-head"><h2>Hallazgos</h2>' +
    '<button class="btn-export" id="exportBtn">Descargar checklist (Excel)</button></div>';
  html += '<div class="summary-bar">' +
    '<span class="chip'+(total===0?" ok":" alert")+'">'+total+' hallazgo(s) en total</span>';
  pasosMeta.forEach(function(p){
    var items = r[p.key];
    var chipTxt = items===undefined ? "—" : items===null ? "omitido" : items.length;
    html += '<span class="chip">'+p.corto+': '+chipTxt+'</span>';
  });
  html += '</div>';

  pasosMeta.forEach(function(p){
    var items = r[p.key];
    var countTxt = items===undefined ? "sin ejecutar" : items===null ? "omitido" : items.length+' hallazgo(s)';
    html += '<div class="step-block"><div class="step-head"><h4>'+p.titulo+'</h4>' +
      '<span class="count">'+countTxt+'</span></div><div class="step-body">';
    if(items===undefined){
      html += '<div class="empty-skip">Aún no se ejecutó este paso — usa "Ejecutar solo este paso" o el botón global.</div>';
    } else if(items===null){
      html += '<div class="empty-skip">'+(p.key==="paso1"
        ? "Paso omitido: no se subió el reporte de cajeras."
        : "Paso omitido: faltan archivos de este paso.")+'</div>';
    } else if(items.length===0){
      html += '<div class="empty-ok">Sin diferencias detectadas en este paso.</div>';
    } else {
      items.forEach(function(item, idx){
        var ckKey = p.key+"_"+idx;
        var checked = STATE.checks[ckKey] ? "checked" : "";
        html += '<div class="finding'+(STATE.checks[ckKey]?" done":"")+'">' +
          '<input type="checkbox" data-ck="'+ckKey+'" '+checked+'>' +
          '<div class="ftxt">'+item.texto+'<span class="src">'+item.fuente+'</span></div></div>';
      });
    }
    html += '</div></div>';
  });
  area.innerHTML = html;

  area.querySelectorAll('input[type=checkbox]').forEach(function(cb){
    cb.addEventListener("change", function(){
      var k = cb.getAttribute("data-ck");
      STATE.checks[k] = cb.checked;
      renderResultados();
    });
  });
  document.getElementById("exportBtn").onclick = exportarChecklist;
}

function exportarChecklist(){
  var r = STATE.results;
  var rows = [["Paso","Fecha","Banco","Hallazgo","Fuente","Corregido"]];
  var pasosMeta = [["Paso 1","paso1"],["Paso 2","paso2"],["Paso 3","paso3"],["Paso 4","paso4"]];
  pasosMeta.forEach(function(p){
    var label = p[0], key = p[1], items = r[key];
    if(items===undefined){
      rows.push([label, "", "", "Paso no ejecutado en esta sesión.", "", ""]);
      return;
    }
    if(items===null){
      rows.push([label, "", "", key==="paso1"
        ? "Paso omitido: no se subió el reporte de cajeras."
        : "Paso omitido: faltan archivos de este paso.", "", ""]);
      return;
    }
    items.forEach(function(item, idx){
      var ckKey = key+"_"+idx;
      rows.push([label, item.fecha, item.banco, item.texto, item.fuente, STATE.checks[ckKey] ? "Sí" : "No"]);
    });
  });
  var ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:8},{wch:12},{wch:10},{wch:70},{wch:40},{wch:10}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Hallazgos");
  XLSX.writeFile(wb, "checklist_conciliacion_caja_general.xlsx");
}

render();
</script>
</body>
</html>
