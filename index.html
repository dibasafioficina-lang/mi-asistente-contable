<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Asistente Contable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Mulish:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#4A3B41;
    --heading:#573B46;
    --paper:#FBF3F2;
    --brand:#B56B86;
    --brand-dark:#935068;
    --brand-light:#F7E4EC;
    --brand-lighter:#FBE6EC;
    --slate:#93797F;
    --line:#F6E6EA;
    --ok:#4F9878;
    --ok-bg:#EAF3EE;
    --alert:#B5524A;
    --alert-bg:#FBE9E7;
    --card:#FFFFFF;
    --dz-empty-bg:#FDF6F8;
    --dz-empty-line:#ECD3DC;
    --dz-filled-bg:#F6FBF8;
    --dz-filled-line:#CFE3D6;
    --note-bg:#FFF8F3;
    --note-line:#ECCDBF;
    --note-text:#9C7D6D;
    --accent-purple-bg:#ECE7F6;
    --accent-purple:#8467B0;
    --accent-green-bg:#E4F0EC;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Mulish",system-ui,"Segoe UI",Arial,sans-serif;
    background:radial-gradient(120% 90% at 85% -10%, #FBE3EA 0%, var(--paper) 46%, var(--paper) 100%);
    background-attachment:fixed;
    color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;
  }
  .app{max-width:1240px;margin:0 auto;padding:26px 56px 64px}

  /* Encabezado */
  .masthead{display:flex;align-items:center;justify-content:space-between;padding-bottom:22px;margin-bottom:24px}
  .brand{display:flex;align-items:center;gap:13px}
  .logo-box{width:42px;height:42px;border-radius:13px;background:linear-gradient(150deg,#E79BB2,#C07A95);
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(192,122,149,.32);flex-shrink:0}
  .logo-mark{width:15px;height:15px;border:2.5px solid #fff;border-radius:5px 5px 5px 0}
  .masthead h1{font-family:"DM Serif Display",Georgia,serif;font-weight:400;font-size:20px;letter-spacing:.2px;color:var(--heading)}
  .user-chip{display:flex;align-items:center;gap:10px;padding:7px 8px 7px 16px;background:#fff;
    border-radius:999px;box-shadow:0 4px 14px rgba(160,110,130,.10)}
  .user-chip .user-name{font-size:13.5px;font-weight:600;color:#7A6068}
  .user-chip .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(150deg,#F3C4D1,#D693AA);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
  .crumb{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--slate);margin-bottom:18px}
  .crumb button{background:none;border:none;color:var(--brand);font-weight:800;cursor:pointer;font-size:14px;padding:0}
  .crumb button:hover{color:var(--brand-dark);text-decoration:underline}

  /* Menu de modulos */
  .hero{margin-bottom:36px;animation:floatIn .5s ease both}
  .greet{font-size:14px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--brand);margin-bottom:10px}
  .hero-title{font-family:"DM Serif Display",serif;font-weight:400;font-size:42px;line-height:1.1;color:var(--heading);max-width:620px}
  .hero-sub{font-size:16.5px;color:var(--slate);margin-top:12px;max-width:560px;line-height:1.55}
  @keyframes floatIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  .modules-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
  .module-card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:26px 26px 24px;
    box-shadow:0 10px 30px rgba(158,104,126,.09);cursor:pointer;transition:transform .18s ease,box-shadow .18s ease}
  .module-card:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(158,104,126,.18)}
  .module-card.disabled{opacity:.6;cursor:default}
  .module-card.disabled:hover{transform:none;box-shadow:0 10px 30px rgba(158,104,126,.09)}
  .module-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
  .icon-box{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;
    font-size:24px;flex-shrink:0}
  .tag-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;
    font-size:12px;font-weight:800;letter-spacing:.2px;white-space:nowrap}
  .tag-pill .dot{width:6px;height:6px;border-radius:50%}
  .module-card h2{font-family:"DM Serif Display",serif;font-weight:400;font-size:23px;color:var(--heading);margin-top:18px}
  .module-card p{font-size:14.5px;color:var(--slate);margin-top:7px;line-height:1.5}
  .module-action{display:flex;align-items:center;gap:7px;margin-top:20px;font-size:13.5px;font-weight:800;color:var(--brand)}
  .module-action.muted{color:var(--slate);font-weight:700}
  .module-action .arrow{font-size:16px;transform:translateY(.5px)}

  .note-banner{margin-top:30px;display:flex;align-items:center;gap:12px;padding:18px 24px;
    background:var(--note-bg);border:1px dashed var(--note-line);border-radius:18px;color:var(--note-text)}
  .note-banner .ico{font-size:20px}
  .note-banner .txt{font-size:13.5px;line-height:1.5}

  /* Modulo */
  .stage{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:26px;margin-bottom:18px;
    box-shadow:0 10px 30px rgba(158,104,126,.08)}
  .stage h3{font-family:"DM Serif Display",serif;font-weight:400;font-size:19px;color:var(--heading);
    display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .stage h3 .tag{font-family:"Mulish",sans-serif;font-size:11px;font-weight:800;letter-spacing:.4px;
    background:var(--brand-light);color:var(--brand-dark);padding:4px 10px;border-radius:999px}
  .stage p.desc{font-size:13.5px;color:var(--slate);margin-bottom:16px}
  .dropzones{display:grid;gap:14px}
  .dz-grid2{grid-template-columns:1fr 1fr}
  .dropzones.grid2{display:grid;grid-template-columns:1fr 1fr}
  .dz{border:2px dashed var(--dz-empty-line);border-radius:16px;padding:16px;display:flex;align-items:center;gap:12px;
    background:var(--dz-empty-bg);transition:all .15s ease}
  .dz.filled{border-style:solid;border-color:var(--dz-filled-line);background:var(--dz-filled-bg)}
  .dz.dragover{border-color:var(--brand);background:var(--brand-lighter)}
  .dz .ico{font-size:22px}
  .dz .info{flex:1;min-width:0}
  .dz .info .lbl{font-size:13px;font-weight:700;color:var(--heading)}
  .dz .info .expected{font-size:12px;color:var(--brand);margin-top:3px;font-weight:600}
  .dz .info .sub{font-size:12px;color:var(--slate);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
  .dz input[type=file]{display:none}
  .dz .btn-sel{font-size:12.5px;font-weight:800;background:#fff;color:var(--brand);border:1.5px solid var(--line);
    padding:8px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;box-shadow:0 4px 12px rgba(158,104,126,.08)}
  .dz .btn-sel:hover{background:var(--brand);color:#fff;border-color:var(--brand)}

  .stage-run{display:flex;align-items:center;gap:12px;margin-top:18px;padding-top:16px;border-top:1px dashed var(--line);flex-wrap:wrap}
  .btn-step-run{background:#fff;border:1.5px solid var(--brand);color:var(--brand);font-family:"Mulish";font-size:13px;font-weight:800;
    padding:9px 18px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:all .15s ease}
  .btn-step-run:hover:not(:disabled){background:var(--brand);color:#fff}
  .btn-step-run:disabled{border-color:var(--line);color:var(--slate);cursor:not-allowed}
  .stage-run-note{font-size:12.5px;color:var(--slate);font-weight:600}

  .run-bar{display:flex;align-items:center;gap:14px;margin:22px 0;flex-wrap:wrap}
  .btn-run{background:linear-gradient(150deg,#E79BB2,#C07A95);color:#fff;border:none;font-family:"Mulish";
    font-size:15px;font-weight:800;padding:14px 28px;border-radius:999px;cursor:pointer;
    box-shadow:0 10px 24px rgba(192,122,149,.35);transition:all .15s ease}
  .btn-run:disabled{background:#E7CDD6;box-shadow:none;cursor:not-allowed}
  .btn-run:not(:disabled):hover{background:linear-gradient(150deg,#E08AA5,#B56B86)}
  .run-note{font-size:13px;color:var(--slate);font-weight:600}

  .opts{display:flex;gap:22px;align-items:center;font-size:13px;color:var(--slate);flex-wrap:wrap;font-weight:600}
  .opts label{display:flex;align-items:center;gap:8px}
  .opts input[type=number]{width:64px;padding:6px 8px;border:1.5px solid var(--line);border-radius:8px;font-family:inherit}

  /* Resultados */
  .results-head{display:flex;justify-content:space-between;align-items:baseline;margin:32px 0 16px;flex-wrap:wrap;gap:12px}
  .results-head h2{font-family:"DM Serif Display",serif;font-weight:400;font-size:24px;color:var(--heading)}
  .summary-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
  .chip{font-size:12.5px;font-weight:800;padding:7px 14px;border-radius:999px;background:var(--brand-light);color:var(--brand-dark)}
  .chip.ok{background:var(--ok-bg);color:var(--ok)}
  .chip.alert{background:var(--alert-bg);color:var(--alert)}
  .chip.warn{background:#FBF1E3;color:#9A6E1E}

  .step-block{border:1px solid var(--line);border-radius:18px;margin-bottom:16px;overflow:hidden;background:var(--card);
    box-shadow:0 8px 22px rgba(158,104,126,.07)}
  .step-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;
    background:var(--brand-lighter);cursor:pointer;user-select:none}
  .step-head h4{font-family:"DM Serif Display",serif;font-weight:400;font-size:16px;color:var(--heading)}
  .step-head .count{font-family:"Mulish";font-size:12.5px;font-weight:700;color:var(--brand-dark)}
  .step-body{padding:6px 20px 16px}
  .finding{display:flex;gap:14px;align-items:flex-start;padding:14px 4px;border-bottom:1px solid var(--line)}
  .finding:last-child{border-bottom:none}
  .finding input[type=checkbox]{margin-top:3px;width:18px;height:18px;accent-color:var(--brand);flex-shrink:0}
  .finding.done .ftxt{text-decoration:line-through;color:var(--slate);opacity:.6}
  .finding.done .famt{text-decoration:line-through;color:var(--slate);opacity:.6}
  .ftxt{font-size:14px;flex:1;min-width:0}
  .ftxt .src{display:block;font-size:12px;color:var(--slate);margin-top:3px;font-weight:600}
  .famt{font-family:"Mulish";font-size:14.5px;font-weight:800;color:var(--brand-dark);white-space:nowrap;
    margin-left:12px;flex-shrink:0}
  .empty-ok{font-size:14px;color:var(--ok);padding:14px 4px;font-weight:700}
  .empty-skip{font-size:14px;color:var(--slate);padding:14px 4px;font-weight:700;font-style:italic}
  .sinconf-block{margin-top:12px;border-top:1px dashed var(--line);padding-top:6px}
  .sinconf-head{font-size:13px;font-weight:800;color:#9A6E1E;padding:10px 4px 2px}
  .sinconf-head .sinconf-sub{display:block;font-size:12px;font-weight:600;color:var(--slate);margin-top:3px}
  .sinconf-block .finding .famt{color:#9A6E1E}
  .sinconf-block .finding input[type=checkbox]{accent-color:#C79A3A}
  .sinconf-block.transito .sinconf-head{color:#3C6E9A}
  .sinconf-block.transito .finding .famt{color:#3C6E9A}
  .sinconf-block.transito .finding input[type=checkbox]{accent-color:#5B8DEF}
  .sinconf-block.efectivo .sinconf-head{color:#4F7A52}
  .sinconf-block.efectivo .finding .famt{color:#4F7A52}
  .sinconf-block.efectivo .finding input[type=checkbox]{accent-color:#5FA463}
  .saldo-ctx{display:flex;align-items:flex-start;gap:10px;margin:8px 0 14px;padding:12px 14px;
    background:#EEF3FA;border:1px solid #D5E1F0;border-radius:12px}
  .saldo-ctx .ico{font-size:16px;line-height:1.4}
  .saldo-ctx .saldo-line{font-size:13.5px;font-weight:700;color:#3C5670}
  .saldo-ctx .saldo-sub{font-size:12.5px;color:#5B6472;margin-top:3px;line-height:1.5}

  .btn-export{background:#fff;border:1.5px solid var(--line);color:var(--brand);font-family:"Mulish";font-size:13.5px;font-weight:800;
    padding:10px 20px;border-radius:999px;cursor:pointer;box-shadow:0 6px 16px rgba(158,104,126,.08)}
  .btn-export:hover{background:var(--brand);color:#fff;border-color:var(--brand)}

  footer.note{font-size:12.5px;color:var(--slate);margin-top:34px;border-top:1px solid var(--line);padding-top:16px}

  /* Estado de paso cuadrado / bloqueado */
  .step-block.cuadrado{border-color:#BEE3CD;box-shadow:0 8px 22px rgba(79,152,120,.14)}
  .step-block.cuadrado .step-head{background:var(--ok-bg)}
  .step-block.cuadrado .step-head .count{color:var(--ok)}
  .cuadrado-badge{margin:14px 4px 2px;padding:12px;border-radius:12px;text-align:center;
    background:var(--ok-bg);color:var(--ok);font-weight:800;font-size:15px;letter-spacing:2px}
  .stage-opcional{border-style:dashed}
  .opt-badge{font-family:"Mulish";font-size:10.5px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;
    background:var(--brand-light);color:var(--brand-dark);padding:3px 8px;border-radius:999px;margin-left:6px}
  .cierre-panel{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
    margin:6px 0 20px;padding:18px 22px;border-radius:16px;background:var(--ok-bg);border:1px solid #BEE3CD}
  .cierre-panel .cierre-title{font-family:"DM Serif Display",serif;font-size:19px;color:var(--ok)}
  .cierre-panel .cierre-sub{font-size:13.5px;color:#3F6E56;margin-top:4px;max-width:560px;line-height:1.5}
  .cuadrado-badge::before{content:"✓ "}
  .stage-run-note.locked{color:#9A6E1E;font-weight:700}

  .confetti-container{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:9999}
  .confetti-piece{position:absolute;top:-10px;border-radius:2px;opacity:.9;
    animation-name:confettiFall;animation-timing-function:ease-in;animation-fill-mode:forwards}
  @keyframes confettiFall{
    0%{transform:translate(0,0) rotate(0deg);opacity:1}
    100%{transform:translate(var(--drift),110vh) rotate(var(--rot));opacity:.9}
  }
  /* Mensaje motivador */
  .celebrate-toast{position:fixed;top:22%;left:50%;transform:translate(-50%,0);z-index:10000;pointer-events:none;
    background:#fff;border:1px solid var(--line);box-shadow:0 24px 60px rgba(158,104,126,.30);
    border-radius:22px;padding:22px 34px;text-align:center;opacity:1;
    animation:celebrateToast 3.3s ease both}
  .celebrate-toast.grande{animation-duration:3.9s}
  @keyframes celebrateToast{
    0%{opacity:0;transform:translate(-50%,-12px) scale(.82)}
    10%{opacity:1;transform:translate(-50%,0) scale(1.04)}
    16%{transform:translate(-50%,0) scale(1)}
    82%{opacity:1;transform:translate(-50%,0) scale(1)}
    100%{opacity:0;transform:translate(-50%,-16px) scale(.97)}
  }
  .celebrate-toast .celebrate-emoji{font-size:46px;line-height:1;animation:pop .6s ease both}
  .celebrate-toast.grande .celebrate-emoji{font-size:62px}
  .celebrate-toast .celebrate-msg{font-family:"DM Serif Display",serif;font-size:22px;color:var(--heading);margin-top:8px;max-width:360px}
  .celebrate-toast.grande .celebrate-msg{font-size:27px}
  @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
var STATE = {
  view:"menu",
  files:{
    transitoPrevio:null,
    reporte:null, diarioCaja:null, diarioBanistmo:null, diarioStg:null, diarioBancoGeneral:null,
    estBanistmo:null, estStg:null, estBancoGeneral:null, retVisa:null
  },
  parsed:{},
  options:{ ventanaDias:3, tolerancia:0.01 },
  results:null,
  saldoCajaGeneral:null,
  checks:{}
};

/* ---------------- Utilidades ---------------- */
function normTxt(s){
  if(s===null||s===undefined) return "";
  s = String(s);
  s = s.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  return s.toUpperCase().replace(/\s+/g," ").trim();
}
function money(v){
  if(v===null||v===undefined||v==="") return 0;
  if(typeof v==="number") return v;
  var s = String(v).replace(/B\/\.?/gi,"").replace(/\$/g,"").replace(/,/g,"").trim();
  var neg = false;
  if(s.indexOf("(")===0){ neg=true; s=s.replace(/[()]/g,""); }
  if(s.indexOf("-")===0){ neg=true; s=s.replace("-",""); }
  var n = parseFloat(s);
  if(isNaN(n)) return 0;
  return neg ? -n : n;
}
function toISODate(v, mdY){
  if(v===null||v===undefined||v==="") return null;
  if(v instanceof Date && !isNaN(v)) {
    return v.getFullYear()+"-"+String(v.getMonth()+1).padStart(2,"0")+"-"+String(v.getDate()).padStart(2,"0");
  }
  var s = String(v).trim();
  var m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(m){
    var a = parseInt(m[1],10), b = parseInt(m[2],10), y = m[3];
    var mm, dd;
    if(mdY){ mm=a; dd=b; } else { dd=a; mm=b; }
    return y+"-"+String(mm).padStart(2,"0")+"-"+String(dd).padStart(2,"0");
  }
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return m[0].slice(0,10);
  return null;
}
function daysBetween(iso1, iso2){
  if(!iso1||!iso2) return Infinity;
  var d1 = new Date(iso1+"T00:00:00"), d2 = new Date(iso2+"T00:00:00");
  return Math.abs((d1-d2)/86400000);
}
function readWorkbook(file, cb){
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var data = new Uint8Array(e.target.result);
      var wb = XLSX.read(data, {type:"array", cellDates:true});
      var rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, raw:true, defval:null});
      // Adjuntamos todas las hojas (ej. el reporte de cajeras trae una 2ª pestaña con el desglose de cheques).
      rows.hojas = {};
      wb.SheetNames.forEach(function(sn){ rows.hojas[sn] = XLSX.utils.sheet_to_json(wb.Sheets[sn], {header:1, raw:true, defval:null}); });
      cb(rows);
    }catch(err){ alert("No se pudo leer el archivo: "+err.message); }
  };
  reader.readAsArrayBuffer(file);
}
function findHeaderRow(rows, tokens){
  for(var i=0;i<rows.length;i++){
    var row = rows[i];
    if(!row) continue;
    var norm = row.map(function(c){return normTxt(c);});
    var hits = 0;
    for(var t=0;t<tokens.length;t++){
      if(norm.some(function(c){return c.indexOf(normTxt(tokens[t]))!==-1;})) hits++;
    }
    if(hits >= Math.min(3, tokens.length)) return i;
  }
  return -1;
}
function colIdx(headerRow, token){
  for(var i=0;i<headerRow.length;i++){
    if(normTxt(headerRow[i]).indexOf(normTxt(token))!==-1) return i;
  }
  return -1;
}

/* ---------------- Parsers por fuente ---------------- */

// Normalización de fechas del reporte de cajeras (Excel manual):
// Excel a veces guarda las fechas ambiguas (día ≤ 12) como objetos Date con MES/DÍA invertidos
// (ej. "01/06/2026" = 1 de junio se guarda como 6 de enero). Las fechas con día > 12 quedan
// como texto DD/MM inequívoco. Estrategia robusta: deducir el/los meses reales desde esas filas
// de texto inequívocas y usarlos para desambiguar las celdas Date (elegir la orientación cuyo
// mes coincida con el mes dominante del reporte), en vez de invertir a ciegas.
function mesesDominantesReporte(rows, cFecha, startRow){
  var cuenta = {};
  for(var r=startRow;r<rows.length;r++){
    var row = rows[r]; if(!row) continue;
    var raw = row[cFecha];
    if(raw instanceof Date) continue; // ambigua, se resuelve luego
    var s = String(raw==null?"":raw).trim();
    var m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if(m){
      var d = parseInt(m[1],10), mo = parseInt(m[2],10);
      if(d>12 && mo>=1 && mo<=12) cuenta[mo] = (cuenta[mo]||0)+1; // DD/MM inequívoco (día>12)
    }
  }
  return Object.keys(cuenta).map(Number);
}
function fechaReporteConsolidado(raw, meses){
  if(raw instanceof Date && !isNaN(raw)){
    var y=raw.getFullYear(), mo=raw.getMonth()+1, da=raw.getDate();
    var opA={mes:mo, dia:da};          // tal cual
    var opB={mes:da, dia:mo};          // mes/día invertidos
    var aOk = meses.indexOf(opA.mes)!==-1;
    var bOk = meses.indexOf(opB.mes)!==-1 && opB.dia<=12;
    var pick = aOk ? opA : (bOk ? opB : opA); // preferir la orientación cuyo mes sea dominante
    return y+"-"+String(pick.mes).padStart(2,"0")+"-"+String(pick.dia).padStart(2,"0");
  }
  var s=String(raw==null?"":raw).trim();
  var mm=s.match(/^(\d{1,2})-(\d)(\d{4})$/); // texto roto tipo "6-62026" => 6-6-2026
  if(mm) return mm[3]+"-"+String(parseInt(mm[2],10)).padStart(2,"0")+"-"+String(parseInt(mm[1],10)).padStart(2,"0");
  return toISODate(raw, false); // DD/MM/YYYY normal
}

// 1) Reporte consolidado de caja (manual, por cajera)
// Soporta dos formatos:
//  a) Encabezado en 2 filas: fila de grupo (VISA/CLAVE/ACH/CHEQUE) + fila de sub-encabezado (Fecha, Cajera, Sr.George, Banistmo, Total)
//  b) Encabezado en 1 fila combinada (formato anterior: "Visa\nSr.George")
function parseReporteConsolidado(rows){
  var subIdx = findHeaderRow(rows, ["Fecha","Cajera","Sr.George","Banistmo"]);
  if(subIdx===-1) throw new Error("No se encontró el encabezado esperado en el reporte consolidado de caja.");
  var subRow = rows[subIdx];
  var cFecha = colIdx(subRow,"Fecha");
  var cCajera = colIdx(subRow,"Cajera");
  var mapCols = [];

  // Intento (a): dos filas de encabezado, con rellenado hacia adelante de la fila de grupo (celdas combinadas)
  var groupRow = rows[subIdx-1] || [];
  var metodosValidos = ["VISA","CLAVE","ACH","CHEQUE"];
  var filledGroup = [];
  var last = "";
  for(var i=0;i<subRow.length;i++){
    var g = groupRow[i];
    if(g!==null && g!==undefined && normTxt(g)!=="") last = normTxt(g);
    filledGroup[i] = last;
  }
  for(var i=0;i<subRow.length;i++){
    var sub = normTxt(subRow[i]);
    if(sub==="TOTAL" || sub==="") continue; // evitar subtotal por grupo
    // El método puede estar en la fila de grupo (ej. "VISA") o en el sub-encabezado (ej. "Visa\nSr.George").
    // Algunos reportes agrupan Visa+Clave bajo "TARJETA", así que combinamos ambos textos para detectarlo.
    var textoCol = filledGroup[i] + " " + sub;
    var metodo = null;
    for(var m=0;m<metodosValidos.length;m++){
      if(textoCol.indexOf(metodosValidos[m])!==-1){ metodo = metodosValidos[m]; break; }
    }
    if(!metodo) continue;
    var banco = null;
    if(sub.indexOf("GEORGE")!==-1) banco="STG";
    else if(sub.indexOf("BANISTMO")!==-1) banco="Banistmo";
    if(banco) mapCols.push({metodo:metodo, banco:banco, col:i});
  }

  // Intento (b, fallback): formato anterior con metodo+banco en la misma celda
  if(mapCols.length===0){
    function findPairCol(metodo, bancoTag){
      for(var i=0;i<subRow.length;i++){
        var raw = normTxt(subRow[i]);
        if(raw.indexOf(normTxt(metodo))!==-1 && raw.indexOf(normTxt(bancoTag))!==-1) return i;
      }
      return -1;
    }
    mapCols = [
      {metodo:"VISA", banco:"STG", col: findPairCol("Visa","George")},
      {metodo:"VISA", banco:"Banistmo", col: findPairCol("Visa","Banistmo")},
      {metodo:"CLAVE", banco:"STG", col: findPairCol("Clave","George")},
      {metodo:"CLAVE", banco:"Banistmo", col: findPairCol("Clave","Banistmo")},
      {metodo:"ACH", banco:"STG", col: findPairCol("ACH","George")},
      {metodo:"ACH", banco:"Banistmo", col: findPairCol("ACH","Banistmo")},
      {metodo:"CHEQUE", banco:"STG", col: findPairCol("Cheque","George")},
      {metodo:"CHEQUE", banco:"Banistmo", col: findPairCol("Cheque","Banistmo")}
    ].filter(function(m){return m.col>=0;});
  }

  var meses = mesesDominantesReporte(rows, cFecha, subIdx+1);
  var out = [];
  for(var r=subIdx+1;r<rows.length;r++){
    var row = rows[r];
    if(!row) continue;
    var fechaRaw = row[cFecha];
    if(fechaRaw===null||fechaRaw===undefined||normTxt(fechaRaw)==="" ) continue;
    if(normTxt(fechaRaw).indexOf("TOTAL")!==-1) continue;
    var iso = fechaReporteConsolidado(fechaRaw, meses);
    if(!iso) continue;
    var cajera = cCajera>=0 ? row[cCajera] : "";
    mapCols.forEach(function(m){
      var val = money(row[m.col]);
      if(val){
        out.push({fecha:iso, cajera:cajera, banco:m.banco, metodo:m.metodo, monto:val, fila:r+1});
      }
    });
  }
  return out;
}

// 1b) Desglose individual de cheques (2ª pestaña del reporte de cajeras: "CK ...").
// Los cheques no compensan en bloque: cada uno clarea por separado, así que se listan uno a uno.
// Devuelve [{fecha, banco:"STG"|"Banistmo", monto}]. El banco lo da la columna (Cheque Sr.George / Banistmo).
function parseChequesDetalle(reporteRows){
  var hojas = reporteRows && reporteRows.hojas;
  if(!hojas) return [];
  var nombres = Object.keys(hojas);
  var hoja = null;
  for(var i=0;i<nombres.length;i++){ var n=normTxt(nombres[i]); if(n.indexOf("CK")!==-1 || n.indexOf("CHEQUE")!==-1){ hoja=hojas[nombres[i]]; break; } }
  if(!hoja && nombres.length>1) hoja = hojas[nombres[1]]; // fallback: 2ª pestaña
  if(!hoja) return [];
  // Encabezado del detalle: fila con "Fecha" + "Cheque…Sr.George" + "Cheque…Banistmo".
  var hIdx=-1;
  for(var r=0;r<hoja.length;r++){
    var row=hoja[r]; if(!row) continue;
    var f=false, g=false, b=false;
    row.forEach(function(c){ var t=normTxt(c);
      if(t==="FECHA") f=true;
      if(t.indexOf("CHEQUE")!==-1 && t.indexOf("GEORGE")!==-1) g=true;
      if(t.indexOf("CHEQUE")!==-1 && t.indexOf("BANISTMO")!==-1) b=true;
    });
    if(f && g && b){ hIdx=r; break; }
  }
  if(hIdx===-1) return [];
  var header=hoja[hIdx], cFecha=-1, cSTG=-1, cBan=-1;
  for(var i=0;i<header.length;i++){ var t=normTxt(header[i]);
    if(cFecha<0 && t==="FECHA") cFecha=i;
    if(cSTG<0 && t.indexOf("CHEQUE")!==-1 && t.indexOf("GEORGE")!==-1) cSTG=i;
    if(cBan<0 && t.indexOf("CHEQUE")!==-1 && t.indexOf("BANISTMO")!==-1) cBan=i;
  }
  var meses = mesesDominantesReporte(hoja, cFecha, hIdx+1);
  var out=[], fechaAct=null;
  for(var r=hIdx+1;r<hoja.length;r++){
    var row=hoja[r]; if(!row) continue;
    var raw = cFecha>=0?row[cFecha]:null;
    if(raw!==null && raw!==undefined && normTxt(raw)!=="" && normTxt(raw).indexOf("TOTAL")===-1){
      var iso = fechaReporteConsolidado(raw, meses); if(iso) fechaAct=iso;
    }
    if(!fechaAct) continue;
    var vs = cSTG>=0?money(row[cSTG]):0;
    var vb = cBan>=0?money(row[cBan]):0;
    if(vs>0) out.push({fecha:fechaAct, banco:"STG", monto:vs, fila:r+1});
    if(vb>0) out.push({fecha:fechaAct, banco:"Banistmo", monto:vb, fila:r+1});
  }
  return out;
}

// 2) Diario (navegador contabilidad) generico: Caja General / Banistmo / STG
function parseDiario(rows, accountFilter){
  var hIdx = findHeaderRow(rows, ["Fecha","Descripcion","Debito","Credito"]);
  if(hIdx===-1) throw new Error("No se encontró el encabezado esperado en el navegador de diario.");
  var cAccount = colIdx(rows[hIdx],"Account");
  var cFecha = colIdx(rows[hIdx],"Fecha");
  var cRef = colIdx(rows[hIdx],"Referencia");
  var cDesc = colIdx(rows[hIdx],"Descripcion");
  var cDeb = colIdx(rows[hIdx],"Debito");
  var cCred = colIdx(rows[hIdx],"Credito");
  var out = [];
  var lastAccount = "";
  for(var r=hIdx+1;r<rows.length;r++){
    var row = rows[r];
    if(!row) continue;
    if(normTxt(row.join(" ")).indexOf("SALDO TOTAL")!==-1) continue;
    if(normTxt(row.join(" ")).indexOf("MOVIMIENTO MOSTRADO")!==-1) continue;
    if(normTxt(row.join(" ")).indexOf("BALANCE FINAL")!==-1) continue;
    var acc = cAccount>=0 ? row[cAccount] : null;
    if(acc) lastAccount = acc;
    var fechaRaw = cFecha>=0 ? row[cFecha] : null;
    var iso = toISODate(fechaRaw, false);
    if(!iso) continue; // fila secundaria (glosa de detalle), no es movimiento
    var desc = cDesc>=0 ? String(row[cDesc]||"") : "";
    var deb = money(row[cDeb]);
    var cred = money(row[cCred]);
    if(accountFilter && lastAccount && normTxt(lastAccount).indexOf(normTxt(accountFilter))===-1) continue;
    out.push({fecha:iso, cuenta:lastAccount, referencia: cRef>=0?row[cRef]:"", descripcion:desc, debito:deb, credito:cred, fila:r+1});
  }
  return out;
}

// Saldo del diario de Caja General: Balance Inicial (arrastre del mes anterior, dinero en tránsito),
// movimiento del mes y Balance Final. Sirve para contemplar partidas en tránsito que compensan
// entre meses. Devuelve null si el archivo no trae esas filas.
function parseSaldoCajaGeneral(rows){
  function valorFila(row){ // último valor no vacío de la fila (la etiqueta va en la col 0, el monto al final)
    for(var i=row.length-1;i>=0;i--){
      var c=row[i];
      if(c!==null && c!==undefined && String(c).trim()!=="") return money(c);
    }
    return null;
  }
  var res = {inicial:null, movimiento:null, final:null, fechaInicial:null, fechaFinal:null};
  for(var r=0;r<rows.length;r++){
    var row = rows[r]; if(!row) continue;
    var etq = normTxt(row[0]); if(!etq) continue;
    var fecha = (String(row[0]).match(/(\d{4}-\d{2}-\d{2})/)||[])[1] || null;
    if(etq.indexOf("BALANCE INICIAL")!==-1){ res.inicial = valorFila(row); res.fechaInicial = fecha; }
    else if(etq.indexOf("MOVIMIENTO MOSTRADO")!==-1){ res.movimiento = valorFila(row); }
    else if(etq.indexOf("BALANCE FINAL")!==-1){ res.final = valorFila(row); res.fechaFinal = fecha; }
  }
  return (res.inicial!==null || res.final!==null) ? res : null;
}

// 3) Estado de cuenta bancario (Banistmo, STG o Banco General)
function parseEstadoCuenta(rows, tipo){
  // "bancogeneral" usa detección flexible porque no conocemos su formato exacto todavía:
  // busca Fecha, Descripción y columnas de débito/crédito en singular o plural.
  var tokens = tipo==="banistmo" ? ["Fecha","Descripcion","Debito","Credito","Saldo"]
    : tipo==="stg" ? ["Fecha","Descripcion","Debitos","Creditos","Balance"]
    : ["Fecha","Descripcion","Debito","Credito"]; // bancogeneral (tolerante)
  var hIdx = findHeaderRow(rows, tokens);
  if(hIdx===-1) throw new Error("No se encontró el encabezado esperado en el estado de cuenta.");
  var cFecha = colIdx(rows[hIdx],"Fecha");
  var cDesc = colIdx(rows[hIdx],"Descripcion");
  var cDeb, cCred;
  if(tipo==="banistmo"){ cDeb = colIdx(rows[hIdx],"Debito"); cCred = colIdx(rows[hIdx],"Credito"); }
  else if(tipo==="stg"){ cDeb = colIdx(rows[hIdx],"Debitos"); cCred = colIdx(rows[hIdx],"Creditos"); }
  else { // bancogeneral: probar plural y luego singular
    cDeb = colIdx(rows[hIdx],"Debitos"); if(cDeb<0) cDeb = colIdx(rows[hIdx],"Debito");
    cCred = colIdx(rows[hIdx],"Creditos"); if(cCred<0) cCred = colIdx(rows[hIdx],"Credito");
  }
  var out = [];
  for(var r=hIdx+1;r<rows.length;r++){
    var row = rows[r];
    if(!row) continue;
    var iso = toISODate(cFecha>=0?row[cFecha]:null, false);
    if(!iso) continue;
    var desc = cDesc>=0 ? String(row[cDesc]||"") : "";
    out.push({fecha:iso, descripcion:desc, debito:money(row[cDeb]), credito:money(row[cCred]), fila:r+1});
  }
  return out;
}

// 4) Retenciones VISA STG (detalle transaccional con subtotales)
function parseRetencionesVisa(rows){
  var hIdx = findHeaderRow(rows, ["Fecha","Monto Bruto","Ret. Imp","Comision","ITBMS"]);
  if(hIdx===-1) throw new Error("No se encontró el encabezado esperado en el informe de retenciones VISA.");
  var cSuc = colIdx(rows[hIdx],"Sucursal");
  var cFecha = colIdx(rows[hIdx],"Fecha");
  var cBruto = colIdx(rows[hIdx],"Monto Bruto");
  var cRet = colIdx(rows[hIdx],"Ret. Imp");
  var cCom = colIdx(rows[hIdx],"Comision");
  var cItbms = colIdx(rows[hIdx],"ITBMS");
  var porDia = {};
  for(var r=hIdx+1;r<rows.length;r++){
    var row = rows[r];
    if(!row) continue;
    var sucVal = cSuc>=0 ? normTxt(row[cSuc]) : "";
    if(sucVal.indexOf("SUB TOTAL")!==-1 || sucVal.indexOf("COMERCIO")!==-1) continue;
    var iso = toISODate(cFecha>=0?row[cFecha]:null, true); // formato MM/DD/YYYY
    if(!iso) continue;
    var bruto = money(row[cBruto]);
    var ret = money(row[cRet]);
    var com = money(row[cCom]);
    var itbms = money(row[cItbms]);
    if(!porDia[iso]) porDia[iso] = {fecha:iso, bruto:0, retenciones:0};
    porDia[iso].bruto += bruto;
    porDia[iso].retenciones += (ret+com+itbms); // vienen en negativo
  }
  var out = [];
  Object.keys(porDia).forEach(function(k){
    var d = porDia[k];
    d.neto = d.bruto + d.retenciones; // retenciones ya es negativo
    out.push(d);
  });
  return out;
}

/* ---------------- Motor de conciliacion ---------------- */

function sumBy(arr, keyFn, valFn){
  var m = {};
  arr.forEach(function(x){
    var k = keyFn(x);
    m[k] = (m[k]||0) + valFn(x);
  });
  return m;
}

// Paso 1: Reporte consolidado (por banco/dia) vs Diario Caja General (por dia, clasificado por banco via texto)
function clasificarBancoPorTexto(desc){
  var n = normTxt(desc);
  if(n.indexOf("BTS")!==-1 || n.indexOf("BANISTMO")!==-1) return "Banistmo";
  if(n.indexOf("STG")!==-1) return "STG";
  // Yappy compensa en Banco General (todo lo que diga YAPPY va a Banco General),
  // más menciones explícitas del banco ("BANCO GENERAL" / "B. GENERAL").
  if(n.indexOf("YAPPY")!==-1 || n.indexOf("BANCO GENERAL")!==-1 || n.indexOf("B. GENERAL")!==-1 || n.indexOf("B.GENERAL")!==-1) return "Banco General";
  return null;
}
// ¿La descripción es un depósito de ACH o cheque que el sistema a veces registra SIN banco?
// (ej. "DEPOSITO ACH DEL...", "DEPOSITO POR CK DEL..."). Se usa para reconocer que la plata
// está en el sistema aunque no lleve etiqueta de banco → hallazgo "sin confirmar" en vez de rojo.
function esAchOChequeSinBanco(desc){
  var n = normTxt(desc);
  if(clasificarBancoPorTexto(desc)) return false; // ya tiene banco
  return n.indexOf("ACH")!==-1 || /(^|\s)CK(\s|$)/.test(n) || n.indexOf("CHEQUE")!==-1;
}
function paso1(reporte, diarioCaja, chequesDetalle, tolerancia){
  var repPorBancoDia = sumBy(reporte, function(x){return x.banco+"|"+x.fecha;}, function(x){return x.monto;});
  // Se usan las lineas de CREDITO del diario (el deposito real ruteado a cada banco: "DEPOSITO DE
  // BANISTMO CK", "DEPOSITO POR TARJETA CLAVE STG", etc.), clasificadas por banco segun su texto.
  // El DEBITO es "la venta" (el desglose de lo cobrado que entra a caja) y es irrelevante para este
  // cuadre banco a banco. Se toma un solo lado (credito) para no doble-contar.
  var cajaFiltrada = diarioCaja.filter(function(x){ return clasificarBancoPorTexto(x.descripcion) && x.credito>0; });
  var cajaPorBancoDia = sumBy(cajaFiltrada, function(x){return clasificarBancoPorTexto(x.descripcion)+"|"+x.fecha;},
    function(x){ return x.credito; });

  // Depósitos ACH/cheque que el sistema NO etiquetó con banco, por día (para explicar diferencias
  // "positivas" donde el reporte asigna a un banco pero el sistema registró el depósito sin banco).
  var sinBancoPorDia = {};
  diarioCaja.forEach(function(x){
    if(x.credito>0 && esAchOChequeSinBanco(x.descripcion)){
      (sinBancoPorDia[x.fecha] = sinBancoPorDia[x.fecha] || []).push({monto:x.credito, desc:x.descripcion, ref:x.referencia, usado:false});
    }
  });

  // Referencia del comprobante (columna D del diario, siempre empieza por "ME-") por día,
  // para citarla en cada hallazgo. Un día suele tener un solo comprobante ME-.
  function esRefME(r){ return /^ME-/i.test(String(r==null?"":r).trim()); }
  var refsPorDia = {};
  diarioCaja.forEach(function(x){
    if(!esRefME(x.referencia)) return;
    var ref = String(x.referencia).trim();
    if(!refsPorDia[x.fecha]) refsPorDia[x.fecha] = [];
    if(refsPorDia[x.fecha].indexOf(ref)===-1) refsPorDia[x.fecha].push(ref);
  });
  function comprobanteTxt(fecha, refPreferida){
    var rs = (refPreferida && esRefME(refPreferida)) ? [String(refPreferida).trim()] : (refsPorDia[fecha] || []);
    return rs.length ? (" · Comprobante " + rs.join(" / ")) : "";
  }

  var BANCOS = ["STG","Banistmo"];
  var dias = {};
  Object.keys(repPorBancoDia).forEach(function(k){ dias[k.split("|")[1]] = true; });
  Object.keys(cajaPorBancoDia).forEach(function(k){ dias[k.split("|")[1]] = true; });

  var hallazgos = [];
  Object.keys(dias).sort().forEach(function(fecha){
    // diferencia por banco ese día (reporte de cajeras vs crédito del sistema)
    var d = {};
    BANCOS.forEach(function(bk){
      var a = repPorBancoDia[bk+"|"+fecha]||0, b = cajaPorBancoDia[bk+"|"+fecha]||0;
      d[bk] = { a:a, b:b, diff: Math.round((a-b)*100)/100 };
    });
    var dS = d.STG.diff, dB = d.Banistmo.diff;

    // 1) Mismo monto en bancos distintos: el informe lo pone en un banco y el sistema en el otro
    //    (diferencias opuestas que se cancelan). Se emite UNA sola alerta clara en vez de dos.
    if(Math.abs(dS) > tolerancia && Math.abs(dB) > tolerancia &&
       Math.abs(dS + dB) <= tolerancia && (dS > 0) !== (dB > 0)){
      var monto = Math.abs(dS);
      var bancoInforme = dS > 0 ? "STG" : "Banistmo";  // el reporte lo asigna aquí (diferencia positiva)
      var bancoSistema = dS > 0 ? "Banistmo" : "STG";  // el sistema lo depositó aquí
      hallazgos.push({
        fecha:fecha, banco:bancoInforme, monto:monto, clase:"diff",
        texto: "El monto B/ " + monto.toFixed(2) + " del " + fecha + " tiene bancos diferentes: el informe de cajeras lo reporta en " +
               bancoInforme + " y el diario de Caja General lo registró en " + bancoSistema +
               ". Verifica el informe de caja y el navegador de Caja General." + comprobanteTxt(fecha),
        fuente: "Reporte consolidado de caja / Diario Caja General"
      });
      return;
    }

    // 2) Por banco: sin confirmar (ACH/cheque sin banco) o diferencia genérica
    BANCOS.forEach(function(bk){
      var info = d[bk], diff = info.diff;
      if(Math.abs(diff) <= tolerancia) return;

      // ¿La diferencia positiva (reporte > sistema-etiquetado) se explica por un depósito ACH/cheque
      // que el sistema registró sin banco ese día? Entonces la plata está, solo falta la etiqueta.
      if(diff > tolerancia){
        var pool = sinBancoPorDia[fecha] || [];
        var match = null;
        for(var i=0;i<pool.length;i++){
          if(!pool[i].usado && Math.abs(pool[i].monto - diff) <= tolerancia){ match = pool[i]; break; }
        }
        if(match){
          match.usado = true;
          hallazgos.push({
            fecha:fecha, banco:bk, monto:diff, clase:"sin_confirmar",
            texto: bk + " " + fecha + ": la cajera reportó B/ " + diff.toFixed(2) +
                   " para este banco y el sistema tiene el depósito (\"" + String(match.desc).trim() +
                   "\") pero sin etiqueta de banco, así que no se puede confirmar a qué banco entró." + comprobanteTxt(fecha, match.ref),
            fuente: "Reporte consolidado de caja / Diario Caja General"
          });
          return;
        }
      }

      hallazgos.push({
        fecha:fecha, banco:bk, monto:diff, clase:"diff",
        texto: "Diferencia " + bk + " " + fecha + ": reporte de cajeras B/ " + info.a.toFixed(2) +
               " vs. diario Caja General (depósitos a " + bk + ") B/ " + info.b.toFixed(2) + " (dif. B/ " + diff.toFixed(2) + ")" + comprobanteTxt(fecha),
        fuente: "Reporte consolidado de caja / Diario Caja General"
      });
    });
  });

  // Consistencia del desglose de cheques (2ª pestaña): la suma de los cheques individuales por
  // banco/día debe igualar el total de cheques del reporte (columna Cheque de la 1ª pestaña).
  if(chequesDetalle && chequesDetalle.length){
    var detBD = sumBy(chequesDetalle, function(x){return x.banco+"|"+x.fecha;}, function(x){return x.monto;});
    var repChequeBD = sumBy(reporte.filter(function(x){return x.metodo==="CHEQUE";}), function(x){return x.banco+"|"+x.fecha;}, function(x){return x.monto;});
    var clavesCh = {};
    Object.keys(detBD).forEach(function(k){clavesCh[k]=true;});
    Object.keys(repChequeBD).forEach(function(k){clavesCh[k]=true;});
    Object.keys(clavesCh).sort().forEach(function(k){
      var p = k.split("|"), bk = p[0], fecha = p[1];
      var det = detBD[k]||0, tot = repChequeBD[k]||0, dch = Math.round((det-tot)*100)/100;
      if(Math.abs(dch) > tolerancia){
        hallazgos.push({
          fecha:fecha, banco:bk, monto:dch, clase:"diff",
          texto: "Cheques " + bk + " " + fecha + ": el desglose individual suma B/ " + det.toFixed(2) +
                 " pero el total de cheques del reporte es B/ " + tot.toFixed(2) + " (dif. B/ " + dch.toFixed(2) + ").",
          fuente: "Reporte de cajeras (desglose de cheques vs. total)"
        });
      }
    });
  }
  return hallazgos;
}

// Mes dominante (YYYY-MM) entre un conjunto de fechas ISO.
function mesDominante(fechas){
  var ym = {};
  fechas.forEach(function(f){ if(f){ var k=f.slice(0,7); ym[k]=(ym[k]||0)+1; } });
  var best=null, max=-1;
  Object.keys(ym).forEach(function(k){ if(ym[k]>max){ max=ym[k]; best=k; } });
  return best;
}
// Último día calendario del mes dominante (para los bordes de mes).
function ultimoDiaMes(fechas){
  var best = mesDominante(fechas); if(!best) return null;
  var y=parseInt(best.slice(0,4),10), m=parseInt(best.slice(5,7),10);
  return best + "-" + String(new Date(y, m, 0).getDate()).padStart(2,"0"); // día 0 del mes sig. = último del actual
}
// Primer día del mes dominante.
function primerDiaMes(fechas){
  var best = mesDominante(fechas); return best ? (best + "-01") : null;
}
// ¿La descripción es un ACH/depósito de Brinks? (equivale al efectivo brinks del reporte, no es diferencia).
function esBrinks(desc){ return normTxt(desc).indexOf("BRINKS") !== -1; }

// Busca en 'pool' (créditos del banco, con flag .usado) una combinación de 1, 2 o 3 movimientos
// no usados, dentro de la ventana de días respecto a 'fecha', que sumen 'objetivo' (± tolerancia).
// El banco a veces refleja un depósito combinado de Caja General partido en varias líneas
// (ej. 429.74 aparece como 314.55 + 115.19). Devuelve los índices usados o null.
function buscarCombinacion(pool, fecha, objetivo, ventanaDias, tolerancia){
  if(Math.abs(objetivo) <= tolerancia) return null;
  var idxs = [];
  for(var i=0;i<pool.length;i++){ if(!pool[i].usado && daysBetween(fecha, pool[i].fecha) <= ventanaDias) idxs.push(i); }
  var a, b, c;
  for(a=0;a<idxs.length;a++){ if(Math.abs(pool[idxs[a]].monto - objetivo) <= tolerancia) return [idxs[a]]; }
  for(a=0;a<idxs.length;a++) for(b=a+1;b<idxs.length;b++){
    if(Math.abs(pool[idxs[a]].monto + pool[idxs[b]].monto - objetivo) <= tolerancia) return [idxs[a],idxs[b]];
  }
  for(a=0;a<idxs.length;a++) for(b=a+1;b<idxs.length;b++) for(c=b+1;c<idxs.length;c++){
    if(Math.abs(pool[idxs[a]].monto + pool[idxs[b]].monto + pool[idxs[c]].monto - objetivo) <= tolerancia) return [idxs[a],idxs[b],idxs[c]];
  }
  return null;
}
function esChequeDesc(desc){
  var n = normTxt(desc);
  return /(^|\s)CK(\s|$)/.test(n) || n.indexOf("CHEQUE")!==-1;
}
// Subset-sum recursivo: busca cualquier subconjunto de hasta maxN movimientos no usados (dentro de la
// ventana) que sumen 'objetivo'. Para cheques, que el banco junta de a varios (ej. 4 cheques = 798.23).
// direccion (opcional): "adelante" = el pool debe ser de fecha >= ref (un depósito clarea en/después del
// cheque); "atras" = el pool debe ser de fecha <= ref (los cheques de un depósito son de fecha anterior).
// Sin dirección, ventana absoluta (compatibilidad). Evita el "viaje en el tiempo" (cheque que clarea antes de emitirse).
function buscarSubsetSuma(pool, fecha, objetivo, ventanaDias, tolerancia, maxN, direccion){
  if(Math.abs(objetivo) <= tolerancia) return null;
  var idxs = [];
  for(var i=0;i<pool.length;i++){
    if(pool[i].usado || daysBetween(fecha, pool[i].fecha) > ventanaDias) continue;
    if(direccion==="adelante" && pool[i].fecha < fecha) continue; // el depósito no puede ser anterior al cheque
    if(direccion==="atras" && pool[i].fecha > fecha) continue;    // el cheque no puede ser posterior al depósito
    idxs.push(i);
  }
  var res = null;
  function rec(start, restante, acc){
    if(res) return;
    if(Math.abs(restante) <= tolerancia && acc.length>0){ res = acc.slice(); return; }
    if(acc.length >= maxN) return;
    for(var j=start;j<idxs.length;j++){
      if(pool[idxs[j]].monto - restante > tolerancia) continue; // no puede pasarse
      acc.push(idxs[j]); rec(j+1, restante - pool[idxs[j]].monto, acc); acc.pop();
      if(res) return;
    }
  }
  rec(0, objetivo, []);
  return res;
}
// Línea del estado de cuenta que corresponde a un DEPÓSITO (cheque/efectivo), no a una remisión de
// tarjeta ni a comisiones/retenciones. Se usa para emparejar cheques sin cruzarlos con esas líneas.
function esDepositoEstado(desc){
  var n = normTxt(desc);
  if(n.indexOf("REMISION")!==-1 || n.indexOf("RETENCION")!==-1 || n.indexOf("COMISION")!==-1 ||
     n.indexOf("ITBMS")!==-1 || n.indexOf("TIMBRE")!==-1) return false;
  return n.indexOf("DEPOSITO")!==-1 || n.indexOf("DEPÓSITO")!==-1;
}
function refComprobante(ref){
  return /^ME-/i.test(String(ref==null?"":ref).trim()) ? (" · Comprobante " + String(ref).trim()) : "";
}

// Concilia débitos del diario contra créditos del estado de cuenta permitiendo COMBINACIONES en ambos
// sentidos (una línea combinada del diario puede aparecer partida en varias del estado y viceversa;
// ej. el diario tiene 539.18 y el estado 211.82+132.05+195.31). Devuelve lo que quedó sin emparejar.
function conciliarBancoEstado(diarioDeb, estadoCred, ventanaDias, tolerancia, retVisaPorDia){
  function limpio(arr, campo){
    // _chqUsado: filas que la pasada de cheques (cheques del diario + Paso 0) ya emparejó, se excluyen.
    return arr.filter(function(x){ return x[campo]>0 && !x._chqUsado && normTxt((x.descripcion||"")+" "+(x.referencia||"")).indexOf("ABORTED")===-1; })
      .map(function(x){ return {fecha:x.fecha, monto:x[campo], descripcion:x.descripcion, fila:x.fila, usado:false}; });
  }
  var poolDiario = limpio(diarioDeb, "debito");
  var poolEstado = limpio(estadoCred, "credito");
  // 1) cada débito del diario contra una combinación de créditos del estado
  poolDiario.forEach(function(d){
    var combo = buscarCombinacion(poolEstado, d.fecha, d.monto, ventanaDias, tolerancia);
    // VISA compensa NETO en el estado: el diario registra el bruto → probar bruto − retención del día
    // (la 'Remisión V/Mc' del estado ya viene con la retención descontada). Solo aplica a líneas VISA.
    if(!combo && retVisaPorDia && retVisaPorDia[d.fecha]!=null && normTxt(d.descripcion).indexOf("VISA")!==-1){
      combo = buscarCombinacion(poolEstado, d.fecha, Math.round((d.monto - retVisaPorDia[d.fecha])*100)/100, ventanaDias, tolerancia);
    }
    if(combo){ combo.forEach(function(i){ poolEstado[i].usado=true; }); d.usado=true; }
  });
  // 2) cada crédito del estado no usado contra una combinación de débitos del diario no usados
  poolEstado.forEach(function(e){
    if(e.usado) return;
    var combo = buscarCombinacion(poolDiario, e.fecha, e.monto, ventanaDias, tolerancia);
    if(combo){ combo.forEach(function(i){ poolDiario[i].usado=true; }); e.usado=true; }
  });
  return {
    faltanEnBanco: poolDiario.filter(function(d){ return !d.usado; }),   // en el diario, no en el estado
    faltanEnDiario: poolEstado.filter(function(e){ return !e.usado; })   // en el estado, no en el diario
  };
}

// Paso 2: Cotejo de lo que Caja General registró como depositado a cada banco (el resultado del
// Paso 1: reporte → Caja General) contra el ESTADO DE CUENTA real de cada banco. Reglas:
//  - Empareja por monto dentro de la ventana de días; acepta que el banco parta un depósito
//    combinado en varias líneas (busca combinaciones que sumen el total).
//  - VISA compensa NETO en el banco: si hay informe de retenciones, para STG también se intenta
//    emparejar el depósito menos la retención del día (bruto − retención = neto).
//  - Los CHEQUES no compensan en bloque: si se sube el reporte con el desglose individual (2ª pestaña),
//    cada cheque se cuadra por separado contra el banco; los que no compensan quedan en tránsito.
//  - Un cheque que no aparece en su banco se busca en los otros bancos; si aparece en otro, se marca
//    como banco mal asignado; si no aparece en ninguno, queda "en tránsito" (pendiente por cambiar).
// estBancoGeneral, retVisa y chequesDetalle son opcionales.
function paso2(diarioCaja, estBanistmo, estStg, estBancoGeneral, retVisaPorDia, chequesDetalle, ventanaDias, tolerancia){
  var hallazgos = [];
  var estados = { "Banistmo": estBanistmo, "STG": estStg };
  if(estBancoGeneral) estados["Banco General"] = estBancoGeneral;
  var usarDetalleCheques = !!(chequesDetalle && chequesDetalle.length);

  // Créditos del banco por banco, con flag .usado (excluye ABORTED).
  var bancoCred = {};
  Object.keys(estados).forEach(function(b){
    bancoCred[b] = (estados[b]||[]).filter(function(x){ return x.credito>0 && normTxt(x.descripcion).indexOf("ABORTED")===-1; })
      .map(function(x){ return {fecha:x.fecha, monto:x.credito, desc:x.descripcion, usado:false}; });
  });

  // Último día del mes: lo que entra ese día queda en tránsito para el mes siguiente (no compensa aún).
  var ultimoDia = ultimoDiaMes(diarioCaja.filter(function(x){ return clasificarBancoPorTexto(x.descripcion) && x.credito>0; }).map(function(x){ return x.fecha; }));

  Object.keys(estados).forEach(function(banco){
    var cajaDep = diarioCaja.filter(function(x){ return clasificarBancoPorTexto(x.descripcion)===banco && x.credito>0; });
    cajaDep.forEach(function(dep){
      // Si usamos el desglose individual, los cheques de Caja General se ignoran acá (se cuadran uno a uno abajo).
      if(usarDetalleCheques && esChequeDesc(dep.descripcion)) return;
      var pool = bancoCred[banco];
      var objetivo = dep.credito;
      // 1) match directo (1:1 o combinación) dentro de la ventana
      var combo = buscarCombinacion(pool, dep.fecha, objetivo, ventanaDias, tolerancia);
      // 2) STG con retenciones VISA: el banco muestra el neto → probar bruto − retención del día
      if(!combo && banco==="STG" && retVisaPorDia && retVisaPorDia[dep.fecha]!=null){
        combo = buscarCombinacion(pool, dep.fecha, Math.round((objetivo - retVisaPorDia[dep.fecha])*100)/100, ventanaDias, tolerancia);
      }
      if(combo){ combo.forEach(function(i){ pool[i].usado = true; }); return; } // cuadrado

      var ref = refComprobante(dep.referencia);
      var refRaw = /^ME-/i.test(String(dep.referencia==null?"":dep.referencia).trim()) ? String(dep.referencia).trim() : "";
      var concepto = String(dep.descripcion||"").trim();
      // 3a) borde de mes: lo del último día del mes queda en tránsito para el mes siguiente (no compensa aún).
      if(ultimoDia && dep.fecha===ultimoDia){
        hallazgos.push({
          fecha:dep.fecha, banco:banco, monto:objetivo, clase:"en_transito",
          concepto:concepto, comprobante:refRaw, motivo:"último día del mes",
          texto: banco + " " + dep.fecha + ": B/ " + objetivo.toFixed(2) + " (\"" + concepto +
                 "\") es del último día del mes — queda en tránsito para el mes siguiente (aún no compensa en el banco)." + ref,
          fuente: "Diario Caja General / Estado de cuenta " + banco
        });
        return;
      }
      // 3b) cheque no encontrado en su banco → buscar en los otros bancos
      if(esChequeDesc(dep.descripcion)){
        var otro = null, comboOtro = null;
        Object.keys(bancoCred).forEach(function(b2){
          if(b2===banco || otro) return;
          var c = buscarCombinacion(bancoCred[b2], dep.fecha, objetivo, ventanaDias, tolerancia);
          if(c){ comboOtro = {banco:b2, idxs:c}; otro = b2; }
        });
        if(otro){
          comboOtro.idxs.forEach(function(i){ bancoCred[otro][i].usado = true; });
          hallazgos.push({
            fecha:dep.fecha, banco:banco, monto:objetivo, clase:"diff",
            texto: "Cheque de B/ " + objetivo.toFixed(2) + " (" + dep.fecha + ") que Caja General asignó a " + banco +
                   " aparece depositado en " + otro + ". Verifica el banco de destino." + ref,
            fuente: "Diario Caja General / Estado de cuenta " + otro
          });
        } else {
          hallazgos.push({
            fecha:dep.fecha, banco:banco, monto:objetivo, clase:"en_transito",
            concepto:concepto, comprobante:refRaw, motivo:"cheque pendiente por cambiar",
            texto: "Cheque de B/ " + objetivo.toFixed(2) + " (" + dep.fecha + ") registrado como depósito a " + banco +
                   " no aparece en ningún estado de cuenta — probablemente en tránsito (pendiente por cambiar)." + ref,
            fuente: "Diario Caja General / Estados de cuenta"
          });
        }
        return;
      }

      // 4) resto: diferencia real
      hallazgos.push({
        fecha:dep.fecha, banco:banco, monto:objetivo, clase:"diff",
        texto: banco + " " + dep.fecha + ": B/ " + objetivo.toFixed(2) + " que el reporte/Caja General registró como depósito a " +
               banco + " (\"" + String(dep.descripcion||"").trim() + "\") no aparece en el estado de cuenta de " + banco + "." + ref,
        fuente: "Diario Caja General / Estado de cuenta " + banco
      });
    });
  });

  // Cheques individuales (2ª pestaña del reporte): no compensan en bloque ni cada uno por separado —
  // el banco a veces junta varios cheques en un solo depósito o los reparte, y clarean días después.
  // Por eso se reconcilia el CONJUNTO de cheques del reporte contra los DEPÓSITOS del estado de cuenta,
  // permitiendo combinaciones en ambos sentidos y sin límite de fecha (solo dentro del mes).
  if(usarDetalleCheques){
    var VENTANA_CHEQUE = 366; // sin límite práctico dentro del mes
    Object.keys(bancoCred).forEach(function(banco){
      // Cheques del reporte de este banco. Los del último día quedan en tránsito (clarean el mes siguiente).
      var chs = [];
      chequesDetalle.filter(function(x){return x.banco===banco;}).forEach(function(x){
        if(ultimoDia && x.fecha===ultimoDia){
          hallazgos.push({ fecha:x.fecha, banco:banco, monto:x.monto, clase:"en_transito",
            concepto:"Cheque (detalle individual)", comprobante:"", motivo:"último día del mes",
            texto:"Cheque de B/ "+x.monto.toFixed(2)+" ("+x.fecha+", "+banco+") es del último día del mes — queda en tránsito para el mes siguiente.",
            fuente:"Desglose de cheques / Estado de cuenta "+banco });
        } else {
          chs.push({ fecha:x.fecha, monto:x.monto, usado:false });
        }
      });
      // Depósitos del estado de cuenta (no remisiones/comisiones), referencias con .usado compartido.
      var depos = bancoCred[banco].filter(function(x){ return esDepositoEstado(x.desc); });
      // Paso A: cada cheque contra una combinación de depósitos (un cheque puede clarear en varios depósitos).
      chs.forEach(function(ch){
        if(ch.usado) return;
        var combo = buscarSubsetSuma(depos, ch.fecha, ch.monto, VENTANA_CHEQUE, tolerancia, 8, "adelante");
        if(combo){ combo.forEach(function(i){ depos[i].usado=true; }); ch.usado=true; }
      });
      // Paso B: cada depósito no usado contra una combinación de cheques (el banco junta varios cheques en un depósito).
      depos.forEach(function(d){
        if(d.usado) return;
        var combo = buscarSubsetSuma(chs, d.fecha, d.monto, VENTANA_CHEQUE, tolerancia, 12, "atras");
        if(combo){ combo.forEach(function(i){ chs[i].usado=true; }); d.usado=true; }
      });
      // Cheques que no clarearon → en tránsito (pendiente por cambiar).
      chs.forEach(function(ch){
        if(ch.usado) return;
        hallazgos.push({ fecha:ch.fecha, banco:banco, monto:ch.monto, clase:"en_transito",
          concepto:"Cheque (detalle individual)", comprobante:"", motivo:"cheque pendiente por cambiar",
          texto:"Cheque de B/ "+ch.monto.toFixed(2)+" ("+ch.fecha+", "+banco+") aún no aparece en el estado de cuenta — en tránsito (pendiente por cambiar).",
          fuente:"Desglose de cheques / Estado de cuenta "+banco });
      });
    });
  }
  return hallazgos;
}

// Paso 3: Diario del banco vs Estado de cuenta real (matching 1:1 por monto +- tolerancia, ventana de dias, excluyendo ABORTED)
function matchUnoAUno(origenA, campoA, origenB, campoB, ventanaDias, tolerancia){
  var usadosB = new Array(origenB.length).fill(false);
  var sinPar = [];
  origenA.forEach(function(a, idxA){
    if(normTxt(a.descripcion||a.referencia).indexOf("ABORTED")!==-1) return; // excluir silenciosamente
    var montoA = a[campoA];
    if(!montoA) return;
    var mejor = -1, mejorDist = Infinity;
    origenB.forEach(function(b, idxB){
      if(usadosB[idxB]) return;
      if(normTxt(b.descripcion).indexOf("ABORTED")!==-1) return;
      var montoB = b[campoB];
      if(Math.abs(montoA-montoB) <= tolerancia){
        var dist = daysBetween(a.fecha, b.fecha);
        if(dist <= ventanaDias && dist < mejorDist){ mejor = idxB; mejorDist = dist; }
      }
    });
    if(mejor>=0){ usadosB[mejor] = true; }
    else { sinPar.push(a); }
  });
  return sinPar;
}
// Conciliación de CHEQUES para el Paso 3: los cheques del diario (depósitos "CK") y los cheques en
// tránsito de meses anteriores (Paso 0) se emparejan contra los DEPÓSITOS del estado de cuenta con
// subset-sum hacia adelante (un cheque clarea en su fecha o después; el banco a veces junta varios).
// Marca `_chqUsado` en las filas emparejadas para que conciliarBancoEstado no las vea, y empuja los
// cheques del diario que no clarearon como "en tránsito". Los cheques del Paso 0 que no clarean NO se
// reportan acá (los reporta el Paso 0). Deja los depósitos sin emparejar para el flujo normal.
function conciliarChequesPaso3(diario, estado, prevCheques, ultimoDia, tolerancia, banco, hallazgos){
  var VENTANA = 366;
  var ckDiario = (diario||[]).filter(function(x){ return x.debito>0 && esChequeDesc(x.descripcion) && normTxt((x.descripcion||"")+" "+(x.referencia||"")).indexOf("ABORTED")===-1; });
  var depos = (estado||[]).filter(function(x){ return x.credito>0 && esDepositoEstado(x.descripcion) && normTxt(x.descripcion).indexOf("ABORTED")===-1; });
  if(!ckDiario.length && !(prevCheques && prevCheques.length)) return;
  var chq = [];
  ckDiario.forEach(function(x){
    if(ultimoDia && x.fecha===ultimoDia){ // último día → en tránsito para el mes siguiente
      x._chqUsado = true;
      hallazgos.push({ fecha:x.fecha, banco:banco, monto:x.debito, clase:"en_transito",
        concepto:(x.descripcion||"").trim(), comprobante:"", motivo:"último día del mes",
        texto: banco + " " + x.fecha + ": B/ " + x.debito.toFixed(2) + " (\"" + (x.descripcion||"").trim() +
               "\") es del último día del mes — queda en tránsito para el mes siguiente (aún no compensa en el estado de cuenta).",
        fuente: "Diario " + banco + " / Estado de cuenta " + banco });
      return;
    }
    chq.push({ src:x, fecha:x.fecha, monto:x.debito, usado:false, origen:"diario" });
  });
  (prevCheques||[]).forEach(function(t){ chq.push({ src:null, fecha:t.fecha, monto:t.monto, usado:false, origen:"prev" }); });
  var dep = depos.map(function(x){ return { src:x, fecha:x.fecha, monto:x.credito, usado:false }; });
  // Paso A: cada cheque contra una combinación de depósitos hacia adelante.
  chq.forEach(function(c){ if(c.usado) return; var combo = buscarSubsetSuma(dep, c.fecha, c.monto, VENTANA, tolerancia, 8, "adelante"); if(combo){ combo.forEach(function(i){ dep[i].usado=true; }); c.usado=true; } });
  // Paso B: cada depósito no usado contra una combinación de cheques hacia atrás (el banco los junta).
  dep.forEach(function(d){ if(d.usado) return; var combo = buscarSubsetSuma(chq, d.fecha, d.monto, VENTANA, tolerancia, 12, "atras"); if(combo){ combo.forEach(function(i){ chq[i].usado=true; }); d.usado=true; } });
  // Marcar usados en las filas fuente (para que conciliarBancoEstado los ignore).
  chq.forEach(function(c){ if(c.usado && c.src) c.src._chqUsado = true; });
  dep.forEach(function(d){ if(d.usado) d.src._chqUsado = true; });
  // Cheques del diario que no clarearon → en tránsito (pendiente por cambiar).
  chq.forEach(function(c){
    if(c.usado || c.origen!=="diario") return;
    c.src._chqUsado = true;
    hallazgos.push({ fecha:c.fecha, banco:banco, monto:c.monto, clase:"en_transito",
      concepto:(c.src.descripcion||"").trim(), comprobante:"", motivo:"cheque pendiente por cambiar",
      texto: "Cheque de B/ " + c.monto.toFixed(2) + " (" + c.fecha + ", " + banco + ") registrado en el diario aún no aparece en el estado de cuenta — en tránsito (pendiente por cambiar).",
      fuente: "Diario " + banco + " / Estado de cuenta " + banco });
  });
}
// diarioBancoGeneral/estBancoGeneral son opcionales: si faltan, ese banco no se concilia.
function paso3(diarioBanistmo, diarioStg, estBanistmo, estStg, diarioBancoGeneral, estBancoGeneral, ventanaDias, tolerancia, retVisaPorDia, transitoPrevio){
  var hallazgos = [];
  var cfgs = [
    {nombre:"Banistmo", diario:diarioBanistmo, estado:estBanistmo},
    {nombre:"STG", diario:diarioStg, estado:estStg, retVisa:retVisaPorDia}
  ];
  if(diarioBancoGeneral && estBancoGeneral) cfgs.push({nombre:"Banco General", diario:diarioBancoGeneral, estado:estBancoGeneral});
  // Bordes de mes: el último día lo pendiente queda en tránsito al mes siguiente; el primer día lo del
  // estado de cuenta suele ser una compensación que venía en tránsito del mes anterior.
  var todasFechas = [];
  cfgs.forEach(function(c){ (c.diario||[]).forEach(function(x){todasFechas.push(x.fecha);}); (c.estado||[]).forEach(function(x){todasFechas.push(x.fecha);}); });
  var ultimoDia = ultimoDiaMes(todasFechas), primerDia = primerDiaMes(todasFechas);
  cfgs.forEach(function(cfg){
    // Pasada de cheques (diario CK + cheques del Paso 0 del mes anterior) vs depósitos del estado.
    // Así los cheques de meses anteriores ya compensados no salen como diferencia.
    var prevChq = (transitoPrevio||[]).filter(function(t){ return t.banco===cfg.nombre; });
    conciliarChequesPaso3(cfg.diario, cfg.estado, prevChq, ultimoDia, tolerancia, cfg.nombre, hallazgos);
    // Concilia diario vs estado permitiendo combinaciones (un depósito combinado del diario que el
    // estado refleja partido en varias líneas, ej. 539.18 = 211.82+132.05+195.31, se da por cuadrado).
    var conc = conciliarBancoEstado(cfg.diario, cfg.estado, ventanaDias, tolerancia, cfg.retVisa);
    // Registrado en el diario pero no en el estado de cuenta.
    conc.faltanEnBanco.forEach(function(f){
      // Último día del mes → queda en tránsito para el mes siguiente (aún no compensa).
      if(ultimoDia && f.fecha===ultimoDia){
        hallazgos.push({
          fecha:f.fecha, banco:cfg.nombre, monto:f.monto, clase:"en_transito",
          concepto:(f.descripcion||"").trim(), comprobante:"", motivo:"último día del mes",
          texto: cfg.nombre + " " + f.fecha + ": B/ " + f.monto.toFixed(2) + " (\"" + (f.descripcion||"").trim() +
                 "\") es del último día del mes — queda en tránsito para el mes siguiente (aún no compensa en el estado de cuenta).",
          fuente: "Diario " + cfg.nombre + " (fila " + f.fila + ") / Estado de cuenta " + cfg.nombre
        });
        return;
      }
      hallazgos.push({
        fecha:f.fecha, banco:cfg.nombre, monto:f.monto, clase:"diff",
        texto: cfg.nombre + " " + f.fecha + ": B/ " + f.monto.toFixed(2) + " registrado en el diario contable no aparece en el estado de cuenta",
        fuente: "Diario " + cfg.nombre + " (fila " + f.fila + ") / Estado de cuenta " + cfg.nombre
      });
    });
    // En el estado de cuenta pero no registrado en el diario.
    conc.faltanEnDiario.forEach(function(f){
      var desc = (f.descripcion||"").trim();
      // Depósitos "Ach De Brinks Panama" = efectivo brinks del reporte (no es diferencia).
      if(esBrinks(desc)){
        hallazgos.push({
          fecha:f.fecha, banco:cfg.nombre, monto:f.monto, clase:"efectivo",
          texto: cfg.nombre + " " + f.fecha + ": B/ " + f.monto.toFixed(2) + " es un depósito en efectivo (Brinks: \"" + desc +
                 "\") — corresponde al efectivo del reporte de cajeras, no es diferencia.",
          fuente: "Estado de cuenta " + cfg.nombre + " (fila " + f.fila + ") / Reporte (efectivo brinks)"
        });
        return;
      }
      // Primer día del mes → probablemente una compensación en tránsito del mes anterior.
      if(primerDia && f.fecha===primerDia){
        hallazgos.push({
          fecha:f.fecha, banco:cfg.nombre, monto:f.monto, clase:"en_transito",
          concepto:desc, comprobante:"", motivo:"compensación del mes anterior (confirmar)",
          texto: cfg.nombre + " " + f.fecha + ": B/ " + f.monto.toFixed(2) + " (\"" + desc +
                 "\") aparece el primer día del mes — probablemente una compensación en tránsito del mes anterior. Confirmá que estaba en circulación (o cargá el Paso 0 para validarlo).",
          fuente: "Estado de cuenta " + cfg.nombre + " (fila " + f.fila + ") / Diario " + cfg.nombre
        });
        return;
      }
      hallazgos.push({
        fecha:f.fecha, banco:cfg.nombre, monto:f.monto, clase:"diff",
        texto: cfg.nombre + " " + f.fecha + ": B/ " + f.monto.toFixed(2) + " en el estado de cuenta no aparece registrado en el diario contable — " + desc,
        fuente: "Estado de cuenta " + cfg.nombre + " (fila " + f.fila + ") / Diario " + cfg.nombre
      });
    });
  });
  return hallazgos;
}

// Paso 4: Retenciones VISA (neto por dia) vs Remision V/Mc del estado de cuenta STG (ventana de dias)
function paso4(retVisa, estStg, ventanaDias, tolerancia){
  var remisiones = estStg.filter(function(x){ return normTxt(x.descripcion).indexOf("REMISION")!==-1 && normTxt(x.descripcion).indexOf("V/MC")!==-1; });
  var usadas = new Array(remisiones.length).fill(false);
  var hallazgos = [];
  retVisa.forEach(function(d){
    var mejor=-1, mejorDist=Infinity;
    remisiones.forEach(function(r, idx){
      if(usadas[idx]) return;
      if(Math.abs(r.credito - d.neto) <= tolerancia){
        // El deposito bancario ocurre el mismo dia del cierre o hasta N dias despues, nunca antes.
        if(r.fecha < d.fecha) return;
        var dist = daysBetween(d.fecha, r.fecha);
        if(dist<=ventanaDias && dist<mejorDist){ mejor=idx; mejorDist=dist; }
      }
    });
    if(mejor>=0){ usadas[mejor]=true; }
    else {
      hallazgos.push({
        fecha:d.fecha, banco:"STG", monto:d.neto,
        texto:"VISA " + d.fecha + ": venta bruta B/ " + d.bruto.toFixed(2) + " menos retenciones B/ " + Math.abs(d.retenciones).toFixed(2) +
              " = neto esperado B/ " + d.neto.toFixed(2) + " sin depósito 'Remisión V/Mc' correspondiente en el estado de cuenta STG",
        fuente:"Informe de retenciones VISA STG / Estado de cuenta STG"
      });
    }
  });
  return hallazgos;
}

/* ---------------- Ejecución por paso (individual o global) ---------------- */
// Cada paso puede correrse solo (si tiene sus propios archivos) o como parte de la
// conciliación completa. r[pasoKey] === undefined -> nunca se ejecutó en esta sesión;
// === null -> se intentó pero faltan archivos de ese paso (se omite); array -> resultado real.
// PASO_ORDEN gobierna la cadena condicionada (cada paso exige que cuadre el anterior) y el "todo
// cuadrado". El Paso 0 NO está en la lista pero es OBLIGATORIO: el Paso 1 exige que cuadre primero
// (ver pasoDesbloqueado/propagarBloqueo). Se corre antes de las conciliaciones bancarias.
var PASO_ORDEN = ["paso1","paso2","paso3"];
var PASO_REQS = {
  // Paso 0 (obligatorio): valida que las partidas en tránsito del mes anterior compensaron este mes.
  paso0: ["transitoPrevio","estBanistmo","estStg"],
  paso1: ["reporte","diarioCaja"],
  // Paso 2: coteja lo que Caja General registró como depositado a cada banco contra el estado de cuenta real.
  paso2: ["diarioCaja","estBanistmo","estStg"],
  // Paso 3: concilia el diario contable de cada banco contra su estado de cuenta real.
  paso3: ["diarioBanistmo","diarioStg","estBanistmo","estStg"]
};
// Archivos opcionales por paso: se leen si están subidos, pero no hacen falta para habilitar el paso.
// El Paso 3 incluye la validación VISA: si se sube el informe de retenciones, además de conciliar
// diario vs estado de cuenta, valida el neto VISA contra el estado de cuenta STG.
var PASO_OPCIONALES = {
  paso0: ["estBancoGeneral"],
  // retVisa: para el neto VISA. reporte: para el desglose individual de cheques (2ª pestaña).
  paso2: ["estBancoGeneral","retVisa","reporte"],
  // diarioCaja es opcional en Paso 3 solo para leer su saldo inicial (contexto de partidas en tránsito).
  // transitoPrevio: cheques del Paso 0, para no marcar como diferencia lo que compensa cheques anteriores.
  paso3: ["diarioBancoGeneral","estBancoGeneral","retVisa","diarioCaja","transitoPrevio"]
};

function pasoListo(pasoKey){
  return PASO_REQS[pasoKey].every(function(k){ return !!STATE.files[k]; });
}
function archivosDePaso(pasoKey){
  return PASO_REQS[pasoKey].concat((PASO_OPCIONALES[pasoKey]||[]).filter(function(k){ return !!STATE.files[k]; }));
}

function computePasoResult(pasoKey, raws, opts){
  // Si tenemos el archivo de Caja General, leemos su saldo (inicial/movimiento/final) para
  // mostrarlo como contexto de partidas en tránsito entre meses.
  if(raws.diarioCaja){ try{ STATE.saldoCajaGeneral = parseSaldoCajaGeneral(raws.diarioCaja); }catch(e){} }
  if(pasoKey==="paso0"){
    if(!raws.transitoPrevio || !raws.estBanistmo || !raws.estStg) return null;
    var trPrev = parseTransitoPrevio(raws.transitoPrevio);
    var eB = parseEstadoCuenta(raws.estBanistmo,"banistmo");
    var eS = parseEstadoCuenta(raws.estStg,"stg");
    var eBG = raws.estBancoGeneral ? parseEstadoCuenta(raws.estBancoGeneral,"bancogeneral") : null;
    return paso0(trPrev, eB, eS, eBG, opts.ventana, opts.tol);
  }
  if(pasoKey==="paso1"){
    if(!raws.reporte || !raws.diarioCaja) return null;
    return paso1(parseReporteConsolidado(raws.reporte), parseDiario(raws.diarioCaja,"Caja General"), parseChequesDetalle(raws.reporte), opts.tol);
  }
  if(pasoKey==="paso2"){
    if(!raws.diarioCaja || !raws.estBanistmo || !raws.estStg) return null;
    var diarioCaja = parseDiario(raws.diarioCaja,"Caja General");
    var estBanistmo = parseEstadoCuenta(raws.estBanistmo,"banistmo");
    var estStg = parseEstadoCuenta(raws.estStg,"stg");
    var estBG = raws.estBancoGeneral ? parseEstadoCuenta(raws.estBancoGeneral,"bancogeneral") : null;
    // Retención VISA por día (magnitud positiva) para cuadrar el neto en STG: bruto − retención = neto del banco.
    var retVisaDia = null;
    if(raws.retVisa){
      retVisaDia = {};
      parseRetencionesVisa(raws.retVisa).forEach(function(d){ retVisaDia[d.fecha] = Math.abs(d.retenciones); });
    }
    // Desglose individual de cheques (2ª pestaña del reporte): si está, los cheques se cuadran uno a uno.
    var chequesDet = raws.reporte ? parseChequesDetalle(raws.reporte) : null;
    return paso2(diarioCaja, estBanistmo, estStg, estBG, retVisaDia, chequesDet, opts.ventana, opts.tol);
  }
  if(pasoKey==="paso3"){
    if(!raws.diarioBanistmo || !raws.diarioStg || !raws.estBanistmo || !raws.estStg) return null;
    var diarioBanistmo = parseDiario(raws.diarioBanistmo,"Banistmo");
    var diarioStg = parseDiario(raws.diarioStg,null).filter(function(x){ return normTxt(x.cuenta).indexOf("BANISTMO")===-1; });
    var estBanistmo = parseEstadoCuenta(raws.estBanistmo,"banistmo");
    var estStg = parseEstadoCuenta(raws.estStg,"stg");
    var diarioBG = raws.diarioBancoGeneral ? parseDiario(raws.diarioBancoGeneral, null) : null;
    var estBG = raws.estBancoGeneral ? parseEstadoCuenta(raws.estBancoGeneral, "bancogeneral") : null;
    // Retención VISA por día (magnitud positiva): el diario STG registra el bruto y el estado el neto,
    // así que el matching prueba bruto − retención = neto (igual que en el Paso 2).
    var retVisaLista = raws.retVisa ? parseRetencionesVisa(raws.retVisa) : null;
    var retVisaDia = null;
    if(retVisaLista){ retVisaDia = {}; retVisaLista.forEach(function(d){ retVisaDia[d.fecha] = Math.abs(d.retenciones); }); }
    // Cheques en tránsito del mes anterior (Paso 0): si están, se usan para no marcar como diferencia
    // los depósitos de junio que en realidad compensan cheques de meses anteriores.
    var transitoPrevio = raws.transitoPrevio ? parseTransitoPrevio(raws.transitoPrevio) : null;
    var hallazgos = paso3(diarioBanistmo, diarioStg, estBanistmo, estStg, diarioBG, estBG, opts.ventana, opts.tol, retVisaDia, transitoPrevio);
    // Validación VISA (antes Paso 4): chequeo independiente de que el neto VISA del informe tiene su
    // 'Remisión V/Mc' en el estado de cuenta STG (además del cuadre diario↔estado de arriba).
    if(retVisaLista){
      hallazgos = hallazgos.concat(paso4(retVisaLista, estStg, opts.ventana, opts.tol));
    }
    return hallazgos;
  }
  return null;
}

function readMany(keys, cb){
  var uniq = keys.filter(function(k,i){ return keys.indexOf(k)===i; });
  var raws = {};
  var pending = uniq.length;
  if(pending===0){ cb(raws); return; }
  uniq.forEach(function(k){
    readWorkbook(STATE.files[k], function(rows){
      raws[k] = rows;
      pending--;
      if(pending===0) cb(raws);
    });
  });
}

function ensureResults(){
  if(!STATE.results) STATE.results = {paso0:undefined, paso1:undefined, paso2:undefined, paso3:undefined};
}

// Un hallazgo cuenta como "diferencia roja" salvo que sea clase "sin_confirmar" (plata presente pero
// sin etiqueta de banco) o "en_transito" (cheque pendiente por cambiar). Esas dos NO bloquean el paso.
function esSinConfirmar(item){ return item && item.clase==="sin_confirmar"; }
function esEnTransito(item){ return item && item.clase==="en_transito"; }
function esEfectivo(item){ return item && item.clase==="efectivo"; } // depósito en efectivo (Brinks), no es diferencia
function esNoRojo(item){ return esSinConfirmar(item) || esEnTransito(item) || esEfectivo(item); }
function contarRojas(items){ return Array.isArray(items) ? items.filter(function(i){return !esNoRojo(i);}).length : 0; }
function contarSinConfirmar(items){ return Array.isArray(items) ? items.filter(esSinConfirmar).length : 0; }
function contarEnTransito(items){ return Array.isArray(items) ? items.filter(esEnTransito).length : 0; }
function contarEfectivo(items){ return Array.isArray(items) ? items.filter(esEfectivo).length : 0; }

// Cuadre limpio para el confetti: cero diferencias ROJAS en todo lo evaluado
// (los "sin confirmar" no lo bloquean: la plata cuadra, solo falta la etiqueta de banco).
function tieneCuadreLimpio(keys, r){
  var evaluados = keys.filter(function(k){ return Array.isArray(r[k]); });
  if(evaluados.length===0) return false;
  return evaluados.every(function(k){ return contarRojas(r[k])===0; });
}

// Un paso está "cuadrado" cuando se ejecutó y no tiene diferencias rojas (los "sin confirmar" no cuentan).
function pasoCuadrado(pasoKey){
  var r = STATE.results && STATE.results[pasoKey];
  return Array.isArray(r) && contarRojas(r)===0;
}
// Cada paso se desbloquea cuando el paso anterior cuadra. El Paso 0 es OBLIGATORIO: el Paso 1 exige que
// el Paso 0 esté cuadrado (ejecutado sin diferencias). El Paso 0 en sí siempre está desbloqueado.
function pasoDesbloqueado(pasoKey){
  var idx = PASO_ORDEN.indexOf(pasoKey);
  if(idx<0) return true;                       // Paso 0 (no está en PASO_ORDEN)
  if(idx===0) return pasoCuadrado("paso0");    // Paso 1 requiere el Paso 0 (obligatorio)
  return pasoCuadrado(PASO_ORDEN[idx-1]);
}
// Paso previo requerido para desbloquear pasoKey (el Paso 0 es el previo del Paso 1).
function pasoPrevio(pasoKey){
  var idx = PASO_ORDEN.indexOf(pasoKey);
  return idx<=0 ? "paso0" : PASO_ORDEN[idx-1];
}
function nombreCortoPaso(pasoKey){
  if(pasoKey==="paso0") return "Paso 0";
  return "Paso " + (PASO_ORDEN.indexOf(pasoKey)+1);
}
// Si un paso deja de cuadrar (o no se ejecutó), los siguientes quedan bloqueados: se marcan con "bloqueado".
function propagarBloqueo(){
  ensureResults();
  // Paso 0 obligatorio: si no cuadró, el Paso 1 (y por cascada el resto) queda bloqueado.
  if(!pasoCuadrado("paso0") && STATE.results[PASO_ORDEN[0]]!==undefined){
    STATE.results[PASO_ORDEN[0]] = "bloqueado";
  }
  for(var i=1;i<PASO_ORDEN.length;i++){
    if(!pasoCuadrado(PASO_ORDEN[i-1])){
      STATE.results[PASO_ORDEN[i]] = "bloqueado";
    }
  }
}
// Refresca toda la vista del módulo (zonas de carga + botones + resultados) tras ejecutar un paso,
// para que el desbloqueo condicional y las etiquetas CUADRADO queden al día.
function refrescarModulo(nota){
  renderModulo1();
  var n = document.getElementById("runNote");
  if(n && nota) n.textContent = nota;
}

function ejecutarPaso(pasoKey){
  if(!pasoListo(pasoKey) || !pasoDesbloqueado(pasoKey)) return; // condicionado a que el paso anterior cuadre
  var note = document.getElementById("runNote");
  if(note) note.textContent = "Leyendo archivos de este paso...";
  readMany(archivosDePaso(pasoKey), function(raws){
    try{
      var opts = {ventana: STATE.options.ventanaDias, tol: STATE.options.tolerancia};
      var result = computePasoResult(pasoKey, raws, opts);
      ensureResults();
      Object.keys(STATE.checks).forEach(function(k){ if(k.indexOf(pasoKey+"_")===0) delete STATE.checks[k]; });
      STATE.results[pasoKey] = result;
      propagarBloqueo();
      var cuadro = Array.isArray(result) && contarRojas(result)===0;
      refrescarModulo(cuadro ? (nombreCortoPaso(pasoKey)+" cuadrado.") : "Paso ejecutado.");
      if(cuadro){
        if(PASO_ORDEN.indexOf(pasoKey)>=0 && tieneCuadreLimpio(PASO_ORDEN, STATE.results) && PASO_ORDEN.every(pasoCuadrado)) celebrarTodo();
        else celebrarPaso(pasoKey);
      }
    }catch(err){
      if(note) note.textContent = "Error: " + err.message;
    }
  });
}

function ejecutarConciliacion(){
  var note = document.getElementById("runNote");
  note.textContent = "Leyendo archivos...";
  var allKeys = ["transitoPrevio","reporte","diarioCaja","diarioBanistmo","diarioStg","estBanistmo","estStg","estBancoGeneral","diarioBancoGeneral","retVisa"]
    .filter(function(k){ return STATE.files[k]; });
  readMany(allKeys, function(raws){
    try{
      var opts = {ventana: STATE.options.ventanaDias, tol: STATE.options.tolerancia};
      ensureResults();
      // Paso 0 OBLIGATORIO: se corre primero. Si falta o no cuadra, se bloquean las conciliaciones.
      STATE.results.paso0 = computePasoResult("paso0", raws, opts);
      if(!pasoCuadrado("paso0")){
        PASO_ORDEN.forEach(function(k){ STATE.results[k] = "bloqueado"; });
        STATE.checks = {};
        refrescarModulo("Paso 0 obligatorio: subí el resumen en tránsito del mes anterior (y los estados de cuenta) para continuar.");
        return;
      }
      // Cada paso se corre solo si el anterior cuadró; en cuanto uno no cuadra, los siguientes quedan bloqueados.
      var corridos = 0, frenado = false;
      PASO_ORDEN.forEach(function(pasoKey, i){
        if(frenado){ STATE.results[pasoKey] = "bloqueado"; return; }
        var res = computePasoResult(pasoKey, raws, opts);
        STATE.results[pasoKey] = res;
        if(res===null){ frenado = true; return; } // faltan archivos → no seguir
        corridos++;
        if(!(Array.isArray(res) && contarRojas(res)===0)) frenado = true; // no cuadró → frenar los siguientes
      });
      STATE.checks = {};
      var todoCuadrado = corridos>0 && PASO_ORDEN.every(pasoCuadrado);
      refrescarModulo(todoCuadrado ? "¡Conciliación completa!" : "Conciliación ejecutada.");
      if(todoCuadrado) celebrarTodo();
    }catch(err){
      note = document.getElementById("runNote"); if(note) note.textContent = "Error: " + err.message;
    }
  });
}

/* ---------------- Confetti + mensaje motivador (celebración al cuadrar) ---------------- */
var FRASES_PASO = [
  "¡Impecable, cuadró perfecto!",
  "¡Ese paso quedó redondito!",
  "¡Cuentas claras, seguimos!",
  "¡Bien ahí! Un paso menos.",
  "¡Excelente trabajo!",
  "¡Sin una diferencia! 👏"
];
var FRASES_TODO = [
  "¡Conciliación completa! Todo cuadra 🏆",
  "¡Lo lograste! Cuadre total 🎯",
  "¡Perfecto de punta a punta! 🌟",
  "¡Cuadre impecable, felicitaciones! 🥳"
];
function fraseAzar(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function launchConfetti(opts){
  opts = opts || {};
  var grande = !!opts.grande;
  var colors = ["#E79BB2","#C07A95","#B56B86","#8467B0","#4F9878","#D9A441","#5B8DEF","#E8654F","#43C6AC"];
  var container = document.createElement("div");
  container.className = "confetti-container";
  document.body.appendChild(container);
  var total = grande ? 240 : 150;
